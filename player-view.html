  '</div>';
  // Currently-equipped panel — shows what's worn in each slot, tap to remove
  html += '<div style="border:1px solid rgba(212,175,55,0.3);border-radius:8px;background:rgba(212,175,55,0.05);padding:10px 12px;margin-bottom:14px;">' +
    '<div style="font-family:Cinzel,serif;font-size:11px;letter-spacing:0.12em;color:var(--gold);margin-bottom:8px;">✦ CURRENTLY EQUIPPED</div>';
  if (!equipped.length) {
    html += '<div style="font-size:12px;color:#666;font-style:italic;">Nothing equipped — tap Equip on any gear below.</div>';
  } else {
    equipped.forEach(it => {
      html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">' +
        '<span style="font-size:10px;font-family:Cinzel,serif;color:var(--text-dim);width:64px;flex-shrink:0;">' + esc(pvSlotLabel(it)) + '</span>' +
        '<span style="flex:1;font-size:13px;color:var(--gold-light);">' + esc(it.name) + (it.acBonus ? ' <span style="color:var(--text-dim);font-size:11px;">+' + it.acBonus + ' AC</span>' : '') + '</span>' +
        '<button class="btn-pv" style="font-size:10px;padding:2px 9px;" onclick="_pvEquip(' + it.id + ',false)">Remove</button>' +
      '</div>';
    });
  }
  html += '</div>';
  if (!inv.length) {
    html += '<div style="font-size:13px;color:#555;font-style:italic;padding:20px 0;text-align:center;">Your bag is empty. Loot and gifts from the DM land here.</div></div>';
    return html;
  }

  const itemRow = (it) => {
    const extra = [];
    if (it.dice) extra.push((it.magicBonus ? '+' + it.magicBonus + ' ' : '') + it.dice + (it.damageType ? ' ' + it.damageType : ''));
    (it.riderDamage || []).forEach(rd => extra.push('☠ +' + rd.dice + (rd.type ? ' ' + rd.type : '')));
    if (it.onHitSave && it.onHitSave.condition) extra.push('save or ' + it.onHitSave.condition);
    if (it.critRange && it.critRange < 20) extra.push('crit ' + it.critRange + '+');
    if (it.acBonus) extra.push('+' + it.acBonus + ' AC');
    if (it.saveBonus) extra.push('+' + it.saveBonus + ' saves');
    if (it.statBonuses) Object.keys(it.statBonuses).forEach(k => { if (it.statBonuses[k]) extra.push('+' + it.statBonuses[k] + ' ' + k.toUpperCase()); });
    if (it.grantResist && it.grantResist.length) extra.push('resist ' + it.grantResist.join('/'));
    if (it.speedBonus) extra.push('+' + it.speedBonus + ' ft');
    if (it.lightFt) extra.push('💡 ' + it.lightFt + ' ft');
    if (it.healDice) extra.push('heals ' + it.healDice);
    const canEquip = PV_EQUIPPABLE.indexOf(it.slot) >= 0;
    let btns = '';
    if (it.slot === 'potion') {
      btns += '<button class="btn-pv" style="font-size:10px;padding:3px 10px;border-color:#64b4ff;color:#90c8ff;" onclick="_pvUseItem(' + it.id + ')">🧪 Drink</button>';
    } else if (canEquip) {
      btns += '<button class="btn-pv" style="font-size:10px;padding:3px 10px;' + (it.equipped ? 'border-color:var(--gold);color:var(--gold-light);background:rgba(212,175,55,0.1);' : '') + '" onclick="_pvEquip(' + it.id + ',' + (it.equipped ? 'false' : 'true') + ')">' + (it.equipped ? '✓ Equipped' : 'Equip') + '</button>';
    }
    btns += '<button class="btn-pv" style="font-size:11px;padding:3px 8px;" onclick="_pvItemMenu(' + it.id + ')" title="Move category or drop">⋯</button>';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid ' + (it.equipped ? 'rgba(212,175,55,0.4)' : 'rgba(255,255,255,0.07)') + ';border-radius:5px;margin-bottom:4px;background:' + (it.equipped ? 'rgba(212,175,55,0.05)' : 'rgba(0,0,0,0.15)') + ';">' +
      '<span>' + (slotIcons[it.slot] || '🎒') + '</span>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:13px;color:var(--parchment);">' + esc(it.name) + (it.qty > 1 ? ' ×' + it.qty : '') + '</div>' +
        (extra.length ? '<div style="font-size:10px;color:var(--text-dim);">' + extra.join(' · ') + '</div>' : '') +
        (it.desc ? '<div style="font-size:10px;color:#666;font-style:italic;">' + esc(it.desc) + '</div>' : '') +
      '</div>' + btns +
    '</div>';
  };

  PV_INV_CATS.forEach(cat => {
    const items = inv.filter(it => cat.slots.indexOf(it.slot || 'gear') >= 0);
    if (!items.length) return;
    html += '<div class="card-section-label" style="border:none;padding:0;margin:14px 0 6px;">' + cat.label + ' <span style="color:#555;font-size:10px;">(' + items.length + ')</span></div>';
    items.forEach(it => { html += itemRow(it); });
  });

  html += '<div style="font-size:10px;color:#555;margin-top:12px;text-align:center;">Tap ⋯ to move an item to another category (e.g. a cloak into Wearables so you can equip it) or drop it.</div>';
  html += '</div>';
  return html;
}

// Item menu: item details + drop (category is set automatically; only the DM can change it)
function pvItemMenu(itemId) {
  const d = latestData;
  const pc = (d.party || []).find(p => String(p.id) === selectedPcId);
  const it = pc && (pc.inventory || []).find(i => i.id === itemId);
  if (!it) return;
  const facts = [];
  if (it.dice) facts.push(it.dice + (it.damageType ? ' ' + it.damageType : ''));
  if (it.acBonus) facts.push('+' + it.acBonus + ' AC');
  if (it.healDice) facts.push('heals ' + it.healDice);
  if (it.lightFt) facts.push('💡 ' + it.lightFt + ' ft');
  let html = '<div style="font-family:Cinzel,serif;font-size:16px;color:var(--gold);margin-bottom:4px;">' + esc(it.name) + '</div>' +
    '<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">' + esc(pvSlotLabel(it) || it.slot) + (facts.length ? ' · ' + facts.join(' · ') : '') + '</div>' +
    (it.desc ? '<div style="font-size:12px;color:#888;font-style:italic;margin-bottom:10px;">' + esc(it.desc) + '</div>' : '') +
    '<div style="font-size:11px;color:#555;margin-bottom:10px;">Its category is set automatically. If it looks wrong, ask your DM to fix it.</div>' +
    '<button class="btn-pv" style="width:100%;justify-content:center;border-color:#e05050;color:#ff8080;" onclick="_pvDropItem(' + itemId + ')">🗑 Drop this item</button>' +
    '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:6px;" onclick="_pvCloseOverlay()">Close</button>';
  showOverlay(html);
}
window._pvItemMenu = pvItemMenu;

function pvDropItem(itemId) {
  const d = latestData;
  const pc = (d.party || []).find(p => String(p.id) === selectedPcId);
  if (!pc) return;
  closeOverlay();
  sendPlayerRequest({ type: 'dropItem', pcId: pc.id, itemId, ts: Date.now() });
}
window._pvDropItem = pvDropItem;

// ══════════════════════════════════════════════════════════════
// RENDER: Character Card (left panel)
// ══════════════════════════════════════════════════════════════
function renderCharacterCard(d) {
  const party = d.party || [];
  const combatants = d.combatants || [];
  const pc = party.find(p => String(p.id) === selectedPcId);
  if (!pc) return '';

  const cmb = combatants.find(x => x.name === pc.name && x.type === 'ally');
  const curHp = cmb ? cmb.hp : (pc.maxhp || 0);
  const maxHp = cmb ? cmb.maxHp : (pc.maxhp || 0);
  const pct = hpPct(curHp, maxHp);
  const hc = hpColor(pct);
  const conditions = (cmb && cmb.conditions) || [];

  let html = '<div class="card">';

  // Name + basic info
  html += '<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;">' +
    avatarHTML(pc, 56, 20) +
    '<div style="flex:1;">' +
      '<div style="font-family:Cinzel,serif;font-size:22px;font-weight:700;color:var(--gold);">' + esc(pc.name) + '</div>' +
      '<div style="font-size:14px;color:var(--text-dim);">' + (pc.race ? esc(pc.race) + ' ' : '') + esc(pc.cls) + ' &middot; Level ' + (pc.level || 1) + '</div>' +
      (pc.player ? '<div style="font-size:12px;color:#555;">played by ' + esc(pc.player) + '</div>' : '') +
    '</div>' +
    '<div style="text-align:right;">' +
      '<div style="font-size:28px;font-weight:700;color:' + hc + ';">' + curHp + '<span style="font-size:14px;color:#555;">/' + maxHp + '</span>' +
        ((cmb && cmb.tempHp > 0) ? ' <span style="font-size:16px;color:#64c8ff;" title="Temporary HP">+' + cmb.tempHp + '🛡</span>' : '') + '</div>' +
      '<div style="font-size:10px;color:#555;">HP' + ((cmb && cmb.exhaustion > 0) ? ' <span style="color:#e0a860;">· 😫 exhaustion ' + cmb.exhaustion + '</span>' : '') + '</div>' +
    '</div>' +
  '</div>';

  // HP bar
  html += '<div class="hp-bar-wrap"><div class="hp-bar" style="width:' + pct + '%;background:' + hc + ';"></div></div>';

  // AC + Init + Inspiration
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;">' +
    '<span style="padding:5px 14px;border-radius:5px;font-size:13px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#aaa;">🛡 AC <strong style="color:var(--parchment);">' + pvEffectiveAC(pc) + '</strong></span>' +
    '<span style="padding:5px 14px;border-radius:5px;font-size:13px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#aaa;">\u26A1 Init <strong style="color:var(--parchment);">' + fmtMod(pc.initBonus || 0) + '</strong></span>' +
    (( parseInt(pc.inspiration) || 0) > 0 ? '<span class="insp-badge" style="cursor:pointer;" title="Spend Inspiration for advantage on a roll" onclick="_pvUseInspiration()">\u2605 Inspired' + ((parseInt(pc.inspiration) || 0) > 1 ? ' \u00d7' + (parseInt(pc.inspiration) || 0) : '') + ' \u2014 tap to use</span>' : '') +
  '</div>';

  // Conditions
  if (conditions.length) {
    const cMeta = (cmb && cmb.condMeta) || {};
    html += '<div style="margin:8px 0;">' + conditions.map(c => {
      const rd = (cMeta[c] && typeof cMeta[c].rounds === 'number') ? ' <span style="color:#e0a860;">' + cMeta[c].rounds + 'r</span>' : '';
      return '<span class="cond-tag" style="cursor:pointer;" onclick="_pvCondInfo(\'' + esc(c).replace(/'/g, "\\'") + '\')">' + esc(c) + rd + ' ℹ</span>';
    }).join('') + '</div>';
  }

  // Death saves — private: only YOU (and the DM) see your pips.
  // In table mode the big death-drama banner handles this instead.
  if (!tableMode && cmb && curHp <= 0 && maxHp > 0 && !(cmb.conditions || []).includes('Stable') && !cmb.isDead) {
    const ds = cmb.deathSuccess || 0, df = cmb.deathFail || 0;
    let pips = '<span style="color:#8fd050;letter-spacing:3px;">';
    for (let i = 0; i < 3; i++) pips += i < ds ? '●' : '○';
    pips += '</span> <span style="color:#e05050;letter-spacing:3px;">';
    for (let i = 0; i < 3; i++) pips += i < df ? '●' : '○';
    pips += '</span>';
    html += '<div style="margin-top:14px;padding:14px;border:2px solid rgba(224,80,80,0.5);border-radius:8px;background:rgba(224,80,80,0.07);text-align:center;">' +
      '<div style="font-family:Cinzel,serif;font-size:15px;color:#ff8080;margin-bottom:6px;">💀 DEATH SAVES <span style="font-size:9px;color:#666;">(only you and the DM see this)</span></div>' +
      '<div style="font-size:20px;margin-bottom:10px;">' + pips + '</div>' +
      '<div style="display:flex;gap:8px;justify-content:center;align-items:center;">' +
        '<input id="pv-ds-roll" type="number" min="1" max="20" placeholder="d20" style="width:70px;font-size:18px;text-align:center;padding:6px;background:rgba(0,0,0,0.4);border:1px solid rgba(224,80,80,0.4);border-radius:6px;color:var(--parchment);">' +
        '<button class="btn-pv" style="border-color:#e05050;color:#ff8080;" onclick="_pvDeathSave()">🎲 Roll Death Save</button>' +
      '</div></div>';
  }

  // Class feature toggles (Rage, Reckless, Dodge)
  if (cmb) {
    const NAMED_FEATS = ['Action Surge', 'Second Wind', 'Bardic Inspiration'];
    const avail = ['Dodge', 'Disengage', 'Hide'].concat((pc.features || []).filter(f => (PV_FEATURES[f] || NAMED_FEATS.includes(f)) && f !== 'Dodge'));
    const myTurnNow = isMyTurn(d);
    if (avail.length) {
      html += '<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">';
      if ((cmb.conditions || []).includes('Prone')) {
        html += '<button class="btn-pv" style="font-size:12px;border-color:#ffb450;color:#ffb450;" ' + (myTurnNow ? '' : 'disabled ') + 'onclick="_pvStandUp()">🧍 Stand Up (½ move)</button>';
      }
      avail.forEach(f => {
        if (f === 'Second Wind') {
          const used = !!cmb.secondWindUsed;
          html += '<button class="btn-pv" style="font-size:12px;' + (used ? 'opacity:0.4;' : 'border-color:#8fd050;color:#8fd050;') + '" ' +
            ((myTurnNow && !used) ? '' : 'disabled ') + 'onclick="_pvToggleFeature(\'Second Wind\')">💨 Second Wind' + (used ? ' (spent)' : '') + '</button>';
          return;
        }
        if (f === 'Bardic Inspiration') {
          const used = !!cmb.bardicUsed;
          html += '<button class="btn-pv" style="font-size:12px;' + (used ? 'opacity:0.4;' : 'border-color:#c890ff;color:#c890ff;') + '" ' +
            ((myTurnNow && !used) ? '' : 'disabled ') + 'onclick="_pvInspire()">🎵 Inspire' + (used ? ' (spent)' : '') + '</button>';
          return;
        }
        if (f === 'Action Surge') {
          const used = !!cmb.actionSurgeUsed;
          html += '<button class="btn-pv" style="font-size:12px;' + (used ? 'opacity:0.4;' : 'border-color:#ffe066;color:#ffe066;') + '" ' +
            ((myTurnNow && !used) ? '' : 'disabled ') + 'onclick="_pvToggleFeature(\'Action Surge\')">⚡⚡ Action Surge' + (used ? ' (spent)' : '') + '</button>';
          return;
        }
        const active = (cmb.conditions || []).includes(PV_FEATURES[f]);
        const icon = f === 'Rage' ? '😤 ' : f === 'Dodge' ? '🛡 ' : f === 'Hide' ? '🥷 ' : f === 'Disengage' ? '🏃 ' : '⚔ ';
        html += '<button class="btn-pv" style="font-size:12px;' +
          (active ? 'border-color:#ffb450;color:#ffb450;background:rgba(255,180,80,0.12);' : '') + '" ' +
          ((myTurnNow || active) ? '' : 'disabled ') + 'onclick="_pvToggleFeature(\'' + f + '\')">' +
          icon + f + (active ? ' ✓' : '') + '</button>';
      });
      // Help an ally + Ready an action — universal actions
      html += '<button class="btn-pv" style="font-size:12px;" ' + (myTurnNow ? '' : 'disabled ') + 'onclick="_pvHelp()">🤝 Help</button>';
      html += '<button class="btn-pv" style="font-size:12px;" ' + (myTurnNow ? '' : 'disabled ') + 'onclick="_pvReady()">⏳ Ready</button>';
      html += '</div>';
      if (cmb.readied) {
        html += '<div style="margin-top:8px;font-size:12px;color:#c8a8ff;border:1px dashed rgba(150,110,230,0.4);border-radius:6px;padding:6px 8px;">⏳ Readied: <strong>' + esc(cmb.readied.action) + '</strong>' + (cmb.readied.trigger ? ' — when ' + esc(cmb.readied.trigger) : '') + ' <span style="color:#666;">(the DM triggers it)</span></div>';
      }
    }
  }

  // Combat actions (playable on your turn)
  const pcActions = pvEffectiveActions(pc);
  if (pcActions.length) {
    const myTurn = isMyTurn(d);
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Actions' +
      (myTurn ? ' <span style="color:var(--gold-light);font-size:9px;text-transform:none;letter-spacing:0;">— it\'s your turn!</span>'
              : ' <span style="font-size:9px;color:#555;text-transform:none;letter-spacing:0;">(usable on your turn during combat)</span>') + '</div>';
    pcActions.forEach((a, i) => {
      const meNow = myCombatant(d);
      const tuNow = (meNow && meNow.turnUsed) || {};
      const spent = myTurn && (a.cost === 'bonus' ? tuNow.bonus : pvActionsUsed(meNow) >= pvMaxActions(meNow));
      html += '<div class="pv-action-row">' +
        '<span style="font-size:16px;">' + (a.kind === 'heal' ? '❤' : '⚔') + '</span>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:14px;font-weight:600;color:var(--parchment);">' + esc(a.name) + '</div>' +
          '<div style="font-size:11px;color:var(--text-dim);">' + (a.range || 5) + ' ft · ' + esc(a.dice || '') + (a.kind !== 'heal' ? ' · +' + (a.bonus || 0) + ' to hit' : '') + '</div>' +
        '</div>' +
        '<button class="pv-action-use" ' + ((myTurn && !spent) ? '' : 'disabled') + ' onclick="_pvUseAction(' + i + ')">' + (spent ? 'USED' : 'USE') + '</button>' +
      '</div>';
    });
    html += '</div>';
  }

  // Spells — cast with automatic slot burn
  const pcSpells = pc.spells || [];
  if (pcSpells.length) {
    const meNow2 = myCombatant(d);
    const tu2 = (meNow2 && meNow2.turnUsed) || {};
    const myTurn2 = isMyTurn(d);
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Spells</div>';
    pcSpells.forEach((s, i) => {
      const lvl = s.level || 0;
      const slotOk = lvl === 0 || (pc.spellSlots || []).some((sl, idx) => idx + 1 >= lvl && sl.max > 0 && sl.used < sl.max);
      const canCast = myTurn2 && pvActionsUsed(meNow2) < pvMaxActions(meNow2) && slotOk;
      const bits = [lvl === 0 ? 'Cantrip' : 'L' + lvl,
        s.kind === 'save' ? (s.saveAbility || 'dex').toUpperCase() + ' save' : s.kind === 'heal' ? 'Heal' : 'Spell attack',
        s.aoeFt ? s.aoeFt + ' ft radius' : (s.range || 60) + ' ft',
        esc(s.dice || '') + (s.damageType ? ' ' + esc(s.damageType) : ''),
        s.concentration ? 'conc.' : ''].filter(Boolean);
      html += '<div class="pv-action-row">' +
        '<span style="font-size:16px;">✨</span>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:14px;font-weight:600;color:#90c8ff;">' + esc(s.name) + '</div>' +
          '<div style="font-size:11px;color:var(--text-dim);">' + bits.join(' · ') + '</div>' +
        '</div>' +
        '<button class="pv-action-use" style="border-color:#64b4ff;color:#90c8ff;background:rgba(100,180,255,0.12);" ' + (canCast ? '' : 'disabled') + ' onclick="_pvCastSpell(' + i + ')">' + (!slotOk && lvl > 0 ? 'NO SLOT' : (!canCast && myTurn2 && slotOk) ? 'USED' : 'CAST') + '</button>' +
      '</div>';
    });
    html += '</div>';
  }

  // Ability scores
  html += '<div class="ability-grid">';
  ['STR','DEX','CON','INT','WIS','CHA'].forEach((label, i) => {
    const keys = ['str','dex','con','int','wis','cha'];
    const val = pc[keys[i]] || 10;
    const m = mod(val);
    html += '<div class="ability-box">' +
      '<div class="ability-mod">' + fmtMod(m) + '</div>' +
      '<div class="ability-score">' + val + '</div>' +
      '<div class="ability-label">' + label + '</div>' +
    '</div>';
  });
  html += '</div>';

  // Skills
  const skills = pc.skills || {};
  const hasSkills = SKILL_LIST.some(sk => (skills[sk.key] || 0) > 0);
  if (hasSkills) {
    const pb = profBonus(pc.level || 1);
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Skills <span style="font-size:9px;color:#555;text-transform:none;letter-spacing:0;">(Prof +' + pb + ')</span></div>';
    html += '<div class="skills-grid">';
    SKILL_LIST.forEach(sk => {
      const val = skills[sk.key] || 0;
      const abilityMod = mod(pc[sk.ability] || 10);
      let bonus = abilityMod;
      if (val === 1) bonus += pb;
      if (val === 2) bonus += pb * 2;
      const icon = val === 0 ? '<span style="color:#444;">\u25CB</span>' : val === 1 ? '<span style="color:#90c8ff;">\u25CF</span>' : '<span style="color:#ffe066;">\u2733</span>';
      const nameColor = val > 0 ? '#d4b880' : '#666';
      const bonusColor = val === 2 ? '#ffe066' : val === 1 ? '#90c8ff' : '#666';
      html += '<div class="skill-row">' +
        '<span class="skill-icon">' + icon + '</span>' +
        '<span class="skill-name" style="color:' + nameColor + ';">' + sk.label + '</span>' +
        '<span class="skill-bonus" style="color:' + bonusColor + ';">' + fmtMod(bonus) + '</span>' +
      '</div>';
    });
    html += '</div></div>';
  }

  // Spell slots
  const spellSlots = pc.spellSlots || [];
  if (spellSlots.length) {
    const lvlNames = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Spell Slots</div>';
    spellSlots.forEach((slot, i) => {
      const available = slot.max - slot.used;
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">' +
        '<span style="font-size:11px;color:var(--text-dim);width:28px;flex-shrink:0;">' + lvlNames[i] + '</span>';
      for (let j = 0; j < slot.max; j++) {
        const spent = j >= available;
        html += '<span class="pip" style="background:' + (spent ? 'rgba(255,255,255,0.07)' : 'rgba(100,180,255,0.65)') + ';border:1px solid ' + (spent ? 'rgba(255,255,255,0.12)' : 'rgba(100,180,255,0.9)') + ';' + (spent ? '' : 'box-shadow:0 0 4px rgba(100,180,255,0.3);') + '"></span>';
      }
      html += '<span style="font-size:11px;color:' + (available > 0 ? '#90c8ff' : '#555') + ';margin-left:4px;">' + available + '/' + slot.max + '</span></div>';
    });
    html += '</div>';
  }

  // Abilities / Moves
  const moves = (pc.moves || '').split('\n').filter(Boolean);
  if (moves.length) {
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Abilities &amp; Features</div>';
    moves.forEach(m => {
      const parts = m.split('\u2014');
      const name = parts[0];
      const rest = parts.slice(1).join('\u2014');
      html += '<div style="padding:4px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04);">' +
        '<strong style="color:var(--gold-light);">' + esc(name.trim()) + '</strong>' +
        (rest ? ' <span style="color:var(--text-dim);">\u2014 ' + esc(rest.trim()) + '</span>' : '') +
      '</div>';
    });
    html += '</div>';
  }

  // Personal inventory — compact summary; full management lives in the 🎒 Bag tab
  const myInv = pc.inventory || [];
  {
    const equippedNames = myInv.filter(it => it.equipped).map(it => esc(it.name));
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">' +
      '<div class="card-section-label" style="border:none;padding:0;margin:0;">My Bag <span style="color:#ffd700;font-size:11px;text-transform:none;letter-spacing:0;margin-left:6px;">🪙 ' + (pc.gold || 0) + ' gold · ' + myInv.length + ' item' + (myInv.length === 1 ? '' : 's') + '</span></div>' +
      '<button class="btn-pv" style="font-size:11px;padding:3px 12px;border-color:var(--gold);color:var(--gold-light);" onclick="_pvSwitchTab(\'inventory\')">Open Bag →</button>' +
    '</div>';
    if (equippedNames.length) {
      html += '<div style="font-size:11px;color:var(--text-dim);margin-top:6px;"><span style="color:var(--gold-light);">Equipped:</span> ' + equippedNames.join(' · ') + '</div>';
    } else if (!myInv.length) {
      html += '<div style="font-size:12px;color:#555;font-style:italic;margin-top:6px;">Empty — loot and gifts from the DM show up here.</div>';
    } else {
      html += '<div style="font-size:11px;color:#666;margin-top:6px;">Nothing equipped yet — open your Bag to equip gear.</div>';
    }
    html += '</div>';
  }

  // Party Inventory
  const inv = d.partyInventory || [];
  if (inv.length) {
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Party Inventory</div>';
    inv.forEach(item => {
      html += '<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);">' +
        '<span style="font-size:18px;">' + (item.icon || '?') + '</span>' +
        '<div>' +
          '<div style="font-size:14px;color:#d4b880;">' + esc(item.name) + '</div>' +
          (item.desc ? '<div style="font-size:12px;color:#555;">' + esc(item.desc) + '</div>' : '') +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  }

  html += '</div>'; // close card
  return html;
}

function renderInitiativePanel(d) {
  const combatants = d.combatants || [];
  if (!combatants.length) return '';

  let html = '<div class="card">';

  // Combat status banner
  if (d.combatActive) {
    html += '<div class="combat-banner combat-active">\u2694 COMBAT \u2014 Round ' + (d.currentRound || 1) + '</div>';
  } else {
    html += '<div class="combat-banner combat-inactive">Initiative Set \u2014 Combat Not Started</div>';
  }

  // Initiative rows
  combatants.forEach((c, i) => {
    if (c.hidden) return; // DM marked this combatant hidden from players
    const isAlly = c.type === 'ally';
    const cHpPct = hpPct(c.hp, c.maxHp);
    const cHc = hpColor(cHpPct);
    const isCurrent = d.combatActive && i === (d.currentTurn >= 0 ? d.currentTurn : 0);
    const conds = c.conditions || [];

    html += '<div class="init-row' + (isCurrent ? ' init-current' : '') + '">';

    // Initiative number
    html += '<span style="font-size:18px;font-weight:700;color:var(--gold);width:30px;text-align:center;flex-shrink:0;">' + (c.initiative || c.init || '?') + '</span>';

    // Name + conditions
    html += '<div style="flex:1;min-width:0;">' +
      '<div style="font-size:15px;font-weight:600;color:' + (isAlly ? '#90c8ff' : '#ff9090') + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
        esc(c.name) + (isCurrent ? ' \u25C0' : '') +
      '</div>';
    if (conds.length) {
      html += '<div style="margin-top:3px;">' + conds.map(cn => '<span class="cond-tag" style="font-size:10px;padding:1px 6px;">' + esc(cn) + '</span>').join('') + '</div>';
    }
    html += '</div>';

    // HP: allies see numbers, enemies show only how hurt they LOOK
    if (isAlly || c.allKnown) {
      html += '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">' +
        '<div style="width:60px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;"><div style="height:100%;width:' + cHpPct + '%;background:' + cHc + ';border-radius:3px;"></div></div>' +
        '<span style="font-size:13px;font-weight:600;color:' + cHc + ';min-width:50px;text-align:right;">' + c.hp + '/' + c.maxHp + '</span>' +
      '</div>';
    } else {
      const hd = pvHpDescriptor(c);
      html += '<span style="font-size:12px;font-family:Cinzel,serif;color:' + hd.color + ';flex-shrink:0;">' + hd.label + '</span>';
    }

    html += '</div>'; // close init-row
  });

  html += '</div>'; // close card
  return html;
}

function useItemReq(itemId) {
  const d = latestData;
  const pc = myPC(d);
  const me = myCombatant(d);
  if (!pc) return;
  const item = (pc.inventory || []).find(i => i.id === itemId);
  // Potions in combat: drink it yourself (bonus action) or feed a neighbor (action)
  if (item && item.slot === 'potion' && me && d.combatActive && d.mapState) {
    const myPos = (d.mapState.tokens || {})[me.id];
    const nearby = (d.combatants || []).filter(c => {
      if (c.id === me.id || c.type !== 'ally') return false;
      const pos = (d.mapState.tokens || {})[c.id];
      return pos && myPos && distFt(myPos, pos) <= 5;
    });
    if (nearby.length) {
      let html = '<div style="font-family:Cinzel,serif;font-size:16px;color:#90c8ff;margin-bottom:10px;">🧪 ' + esc(item.name) + '</div>';
      html += '<button class="pv-target-btn" data-drink="self"><span>Drink it yourself</span><span style="margin-left:auto;font-size:11px;color:var(--text-dim);">bonus action</span></button>';
      nearby.forEach(c => {
        html += '<button class="pv-target-btn" data-drink="' + c.id + '"><span style="color:#90c8ff;">Feed ' + esc(c.name) + (c.hp <= 0 ? ' 💀' : '') + '</span><span style="margin-left:auto;font-size:11px;color:var(--text-dim);">action · 5 ft</span></button>';
      });
      html += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" onclick="_pvCloseOverlay()">Cancel</button>';
      showOverlay(html);
      document.querySelectorAll('[data-drink]').forEach(btn => btn.addEventListener('click', () => {
        closeOverlay();
        const t = btn.dataset.drink;
        sendPlayerRequest({ type: 'useItem', pcId: pc.id, itemId, targetId: t === 'self' ? undefined : parseFloat(t), ts: Date.now() });
        showWaiting('🧪 ' + (t === 'self' ? 'Drinking...' : 'Feeding the potion...'));
      }));
      return;
    }
  }
  sendPlayerRequest({ type: 'useItem', pcId: pc.id, itemId, ts: Date.now() });
  showWaiting('🧪 Using item...');
}
window._pvUseItem = useItemReq;

function pvBodySlot(item) {
  if (item && item.bodySlot) return item.bodySlot;
  const n = String((item && item.name) || '');
  if (/\bring\b/i.test(n)) return 'ring';
  if (/cloak|cape|mantle|shawl/i.test(n)) return 'back';
  if (/amulet|necklace|pendant|periapt|medallion|torc|scarab|brooch|talisman|locket|choker|collar/i.test(n)) return 'neck';
  if (/goggles|lenses|spectacles|eyepatch|monocle|\beyes? of\b/i.test(n)) return 'eyes';
  if (/helm|helmet|crown|circlet|diadem|tiara|coronet|headband|hood|mask|\bhat\b|\bcap\b|veil|mitre/i.test(n)) return 'head';
  if (/bracelet|bangle|wristband/i.test(n)) return 'wrists';
  if (/bracers|bracer|vambrace|armlet|wristguard/i.test(n)) return 'arms';
  if (/gloves|glove|gauntlet|mittens/i.test(n)) return 'hands';
  if (/robe|tunic|shirt|vestment|\bvest\b|doublet|jerkin|blouse|chemise|surcoat|tabard/i.test(n)) return 'torso';
  if (/belt|girdle|sash|waistband/i.test(n)) return 'waist';
  if (/pants|trousers|leggings|legging|breeches|\bkilt\b|skirt|greaves|legguards|chausses|culottes/i.test(n)) return 'legs';
  if (/boots|\bboot\b|shoes|sandals|slippers|footwraps/i.test(n)) return 'feet';
  return 'trinket';
}
const PV_BODY_LABELS = { head: 'Head', eyes: 'Eyes', neck: 'Neck', back: 'Cloak', wrists: 'Wrists', arms: 'Arms', hands: 'Hands', torso: 'Torso', ring: 'Ring', waist: 'Waist', legs: 'Legs', feet: 'Feet', trinket: 'Trinket' };
// The body region an item competes for (mirror of equipGroupFor)
function pvEquipGroup(item) {
  switch (item.slot) {
    case 'weapon': return { key: 'weapon', max: 2 };
    case 'shield': return { key: 'shield', max: 1 };
    case 'light':  return { key: 'light',  max: 1 };
    case 'armor':  return { key: 'torso',  max: 1 };
    case 'wearable': {
      const bs = pvBodySlot(item);
      return { key: bs, max: bs === 'ring' ? 8 : bs === 'wrists' ? 2 : 1 };
    }
    default: return null;
  }
}
function pvSlotLabel(item) {
  if (item.slot === 'weapon') return 'Weapon';
  if (item.slot === 'armor') return 'Torso';   // body armor is worn on the torso
  if (item.slot === 'shield') return 'Shield';
  if (item.slot === 'light') return 'Light';
  if (item.slot === 'wearable') return PV_BODY_LABELS[pvBodySlot(item)] || 'Wearable';
  return '';
}

// What (if anything) a new equip would replace — for the swap confirm
function pvEquipConflict(pc, item) {
  const g = pvEquipGroup(item);
  if (!g) return null;
  const same = (pc.inventory || []).filter(i => {
    if (!i.equipped || i.id === item.id) return false;
    const gg = pvEquipGroup(i);
    return gg && gg.key === g.key;
  });
  return same.length >= g.max ? same[0] : null;
}

function sendEquip(itemId, equipped) {
  const d = latestData;
  const pc = myPC(d);
  if (!pc) return;
  const item = (pc.inventory || []).find(i => i.id === itemId);
  if (equipped && item) {
    const conflict = pvEquipConflict(pc, item);
    if (conflict) {
      showOverlay(
        '<div style="text-align:center;font-family:Cinzel,serif;font-size:16px;color:var(--gold);margin-bottom:6px;">Swap ' + esc(pvSlotLabel(item).toLowerCase()) + '?</div>' +
        '<div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:14px;">You\'re already wearing <strong style="color:var(--parchment);">' + esc(conflict.name) + '</strong>. Take it off and put on <strong style="color:var(--gold-light);">' + esc(item.name) + '</strong> instead?</div>' +
        '<button class="btn-pv" style="width:100%;justify-content:center;border-color:var(--gold);color:var(--gold-light);" onclick="_pvConfirmEquip(' + itemId + ')">↔ Swap it</button>' +
        '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:6px;" onclick="_pvCloseOverlay()">Keep ' + esc(conflict.name) + '</button>'
      );
      return;
    }
  }
  sendPlayerRequest({ type: 'equipItem', pcId: pc.id, itemId, equipped, ts: Date.now() });
}

const PV_GROUNDS = {
  stone:  { base: [74, 70, 66],   jitter: 10 },
  grass:  { base: [58, 92, 48],   jitter: 14 },
  wood:   { base: [96, 66, 40],   jitter: 8 },
  cave:   { base: [38, 34, 32],   jitter: 8 },
  sand:   { base: [148, 126, 84], jitter: 12 },
  water:  { base: [40, 70, 100],  jitter: 10 },
  snow:   { base: [168, 172, 180],jitter: 8 }
};

function pvCellHash(x, y, seed) {
  let h = (x * 73856093) ^ (y * 19349663) ^ (seed * 83492791);
  h = h ^ (h >> 13); h = (h * 1274126177) & 0x7fffffff;
  return (h % 1000) / 1000;
}

let _pvFaceCache = {};
function pvPortraitImg(src) {
  if (!src) return null;
  let img = _pvFaceCache[src];
  if (img) return img.complete ? img : null;
  img = new Image();
  img.onload = () => { if (latestData) drawPlayerMap(latestData); };
  img.src = src;
  _pvFaceCache[src] = img;
  return null;
}

let _pvBgCache = {};
function pvBgImage(m) {
  if (!m.bgImage) return null;
  let img = _pvBgCache[m.bgImage];
  if (img) return img.complete ? img : null;
  img = new Image();
  img.onload = () => { if (latestData) drawPlayerMap(latestData); };
  img.src = m.bgImage;
  _pvBgCache = {};
  _pvBgCache[m.bgImage] = img;
  return null;
}

function drawPlayerMap(d) {
  const m = d.mapState;
  const canvas = document.getElementById('pv-map-canvas');
  if (!m || !canvas) return;
  canvas.width = m.cols * m.cell;
  canvas.height = m.rows * m.cell;
  const ctx = canvas.getContext('2d');

  // Uploaded map image replaces the generated ground
  if (m.bgImage) {
    const bg = pvBgImage(m);
    if (bg) ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    else { ctx.fillStyle = '#181210'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
  }

  // Ground
  const g = PV_GROUNDS[m.ground] || PV_GROUNDS.stone;
  if (!m.bgImage)
  for (let y = 0; y < m.rows; y++) {
    for (let x = 0; x < m.cols; x++) {
      const v = pvCellHash(x, y, m.seed);
      const dv = Math.floor((v - 0.5) * 2 * g.jitter);
      ctx.fillStyle = 'rgb(' + (g.base[0]+dv) + ',' + (g.base[1]+dv) + ',' + (g.base[2]+dv) + ')';
      ctx.fillRect(x * m.cell, y * m.cell, m.cell, m.cell);
      if (v > 0.92) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(x*m.cell + m.cell*v, y*m.cell + m.cell*(1-v), 2, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // Roads
  (m.roads || []).forEach(key => {
    const parts = key.split(',');
    const rx = parseInt(parts[0]), ry = parseInt(parts[1]);
    const v = pvCellHash(rx, ry, m.seed + 31);
    const dv = Math.floor((v - 0.5) * 14);
    ctx.fillStyle = 'rgb(' + (122 + dv) + ',' + (108 + dv) + ',' + (88 + dv) + ')';
    ctx.fillRect(rx * m.cell, ry * m.cell, m.cell, m.cell);
  });

  // Walls
  (m.walls || []).forEach(key => {
    const parts = key.split(',');
    const wx = parseInt(parts[0]), wy = parseInt(parts[1]);
    ctx.fillStyle = '#1c1815';
    ctx.fillRect(wx * m.cell, wy * m.cell, m.cell, m.cell);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(wx * m.cell, wy * m.cell, m.cell, 3);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(wx * m.cell, (wy + 1) * m.cell - 3, m.cell, 3);
  });

  // Buildings with labels
  const PV_BUILDING_STYLES = {
    inn: { roof: '#7a4520', wall: '#5a3818' }, smithy: { roof: '#4e4e52', wall: '#3a3a3e' },
    temple: { roof: '#7a7a9c', wall: '#5c5c78' }, shop: { roof: '#6e5a28', wall: '#544418' },
    house: { roof: '#5e4a32', wall: '#463624' }, guardhouse: { roof: '#46525e', wall: '#343e48' },
    stable: { roof: '#6a5030', wall: '#503c20' }
  };
  (m.buildings || []).forEach(b => {
    const st = PV_BUILDING_STYLES[b.type] || PV_BUILDING_STYLES.house;
    const bx = b.x * m.cell, by = b.y * m.cell, bw = b.w * m.cell, bh = b.h * m.cell;
    ctx.fillStyle = st.wall;
    ctx.fillRect(bx + 2, by + 2, bw - 4, bh - 4);
    ctx.fillStyle = st.roof;
    ctx.fillRect(bx + 5, by + 5, bw - 10, bh - 10);
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(bx + 2, by + 2, bw - 4, bh - 4);
    ctx.fillStyle = 'rgba(20,12,6,0.85)';
    ctx.fillRect(bx + bw / 2 - 4, by + bh - 7, 8, 5);
    if (b.name) {
      ctx.font = 'bold ' + Math.max(11, Math.floor(m.cell * 0.30)) + 'px Cinzel, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 3.5;
      ctx.strokeStyle = 'rgba(0,0,0,0.85)';
      ctx.strokeText(b.name, bx + bw / 2, by + bh / 2);
      ctx.fillStyle = '#f0e0b8';
      ctx.fillText(b.name, bx + bw / 2, by + bh / 2);
    }
  });

  // AoE templates (spell areas — spheres, cones, lines)
  (m.props || []).forEach(p => {
    if (p.kind !== 'aoe') return;
    const acx = (p.x + 0.5) * m.cell, acy = (p.y + 0.5) * m.cell;
    if (p.shape === 'cone' || p.shape === 'line') {
      const rr = p.r * m.cell;
      const ang = Math.atan2((p.ty - p.y), (p.tx - p.x));
      ctx.beginPath();
      if (p.shape === 'cone') {
        ctx.moveTo(acx, acy);
        ctx.arc(acx, acy, rr, ang - 0.49, ang + 0.49);
        ctx.closePath();
      } else {
        const ex = acx + Math.cos(ang) * rr, ey = acy + Math.sin(ang) * rr;
        const w = m.cell * 0.5;
        ctx.moveTo(acx + Math.cos(ang + Math.PI/2) * w, acy + Math.sin(ang + Math.PI/2) * w);
        ctx.lineTo(ex + Math.cos(ang + Math.PI/2) * w, ey + Math.sin(ang + Math.PI/2) * w);
        ctx.lineTo(ex + Math.cos(ang - Math.PI/2) * w, ey + Math.sin(ang - Math.PI/2) * w);
        ctx.lineTo(acx + Math.cos(ang - Math.PI/2) * w, acy + Math.sin(ang - Math.PI/2) * w);
        ctx.closePath();
      }
      ctx.fillStyle = 'rgba(' + (p.color || '255,120,30') + ',0.22)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(' + (p.color || '255,120,30') + ',0.75)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
      return;
    }
    ctx.beginPath();
    ctx.arc(acx, acy, p.r * m.cell, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + (p.color || '255,120,30') + ',0.22)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(' + (p.color || '255,120,30') + ',0.75)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(' + (p.color || '255,120,30') + ',0.9)';
    ctx.font = 'bold ' + Math.floor(m.cell * 0.28) + 'px Cinzel, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText((p.r * 5) + 'ft', acx, acy);
  });

  // Props (with parchment base plates so dark icons stay visible)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  (m.props || []).forEach(p => {
    if (p.kind === 'aoe') return;
    const span = p.cells || 1;
    const pcx = (p.x + span / 2) * m.cell;
    const pcy = (p.y + span / 2) * m.cell;
    const br = m.cell * span * 0.44;
    const grad = ctx.createRadialGradient(pcx, pcy, br * 0.2, pcx, pcy, br);
    grad.addColorStop(0, 'rgba(232,218,184,0.34)');
    grad.addColorStop(1, 'rgba(232,218,184,0.06)');
    ctx.beginPath();
    ctx.arc(pcx, pcy, br, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = Math.floor(m.cell * span * (p.size || 0.8)) + 'px serif';
    ctx.fillText(p.icon, pcx, pcy + m.cell * span * 0.05);
  });

  // Tokens — hidden combatants never render for players
  (d.combatants || []).forEach(c => {
    if (c.hidden) return;
    const pos = (m.tokens || {})[c.id];
    if (!pos) return;
    const cx = (pos.x + 0.5) * m.cell, cy = (pos.y + 0.5) * m.cell, r = m.cell * 0.38;
    const dead = c.hp <= 0;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = dead ? '#3a3a3a' : (c.type === 'ally' ? '#2d6a4f' : c.type === 'enemy' ? '#8b1a1a' : '#5a5a7a');
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = dead ? '#666' : (c.type === 'ally' ? '#7ee0a8' : c.type === 'enemy' ? '#ff8080' : '#b0b0d0');
    ctx.stroke();
    if (!dead && c.maxHp > 0) {
      const pct = Math.max(0, Math.min(1, c.hp / c.maxHp));
      ctx.beginPath();
      ctx.arc(cx, cy, r + 3, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2);
      ctx.strokeStyle = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ff9800' : '#f44336';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      if (c.tempHp > 0) {
        const tpct = Math.max(0, Math.min(1, c.tempHp / c.maxHp));
        ctx.beginPath();
        ctx.arc(cx, cy, r + 6, -Math.PI/2, -Math.PI/2 + tpct * Math.PI * 2);
        ctx.strokeStyle = '#64c8ff'; ctx.lineWidth = 2; ctx.stroke();
      }
    }
    if (!dead && c.concentrating) {
      ctx.beginPath();
      ctx.arc(cx + r * 0.72, cy - r * 0.72, m.cell * 0.11, 0, Math.PI * 2);
      ctx.fillStyle = '#b080ff'; ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    const pcFace = (d.party || []).find(p => p.name === c.name && p.portrait);
    const face = pcFace && !dead ? pvPortraitImg(pcFace.portrait) : null;
    if (face) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r - 1, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(face, cx - r, cy - r, r * 2, r * 2);
      ctx.restore();
    } else {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.floor(m.cell * 0.3) + 'px Cinzel, serif';
      ctx.fillText(dead ? '💀' : initials(c.name), cx, cy);
    }
    ctx.font = Math.floor(m.cell * 0.22) + 'px Cinzel, serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 2.5;
    const label = c.name.length > 10 ? c.name.slice(0, 10) + '…' : c.name;
    ctx.strokeText(label, cx, cy + r + 9);
    ctx.fillText(label, cx, cy + r + 9);
  });

  // Movement mode: highlight reachable squares + ring your token
  if (moveSelecting && isMyTurn(d)) {
    const me = activeUnit(d) || myCombatant(d);
    const myPos = me ? (m.tokens || {})[me.id] : null;
    const pcSpd = Math.max(0, pvSpeedFt(me, me.owner ? 30 : ((myPC(d) || {}).speed || 30)) - ((me && me.turnUsed && me.turnUsed.movedFt) || 0));
    if (myPos) {
      for (let yy = 0; yy < m.rows; yy++) {
        for (let xx = 0; xx < m.cols; xx++) {
          if (distFt(myPos, { x: xx, y: yy }) <= pcSpd) {
            ctx.fillStyle = 'rgba(212,175,55,0.12)';
            ctx.fillRect(xx * m.cell, yy * m.cell, m.cell, m.cell);
          }
        }
      }
      ctx.beginPath();
      ctx.arc((myPos.x + 0.5) * m.cell, (myPos.y + 0.5) * m.cell, m.cell * 0.5, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 3;
      ctx.setLineDash([5, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Fog — fully opaque for players
  ctx.fillStyle = '#0d0804';
  (m.fog || []).forEach(key => {
    const parts = key.split(',');
    ctx.fillRect(parseInt(parts[0]) * m.cell, parseInt(parts[1]) * m.cell, m.cell, m.cell);
  });

  // Spell aiming ghost (drawn before the grid so lines stay crisp)
  drawCastGhost(ctx, m, d);

  // Grid
  if (m.gridOn === false) return;
  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= m.cols; x++) {
    ctx.beginPath(); ctx.moveTo(x*m.cell + 0.5, 0); ctx.lineTo(x*m.cell + 0.5, m.rows*m.cell); ctx.stroke();
  }
  for (let y = 0; y <= m.rows; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*m.cell + 0.5); ctx.lineTo(m.cols*m.cell, y*m.cell + 0.5); ctx.stroke();
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER: Party Sidebar (right column)
// ══════════════════════════════════════════════════════════════
function renderPartySidebar(d) {
  const party = d.party || [];
  const combatants = d.combatants || [];

  let html = '<div class="card" style="position:sticky;top:70px;">';
  html += '<div class="card-section-label">The Party</div>';

  party.forEach(pc => {
    const isYou = String(pc.id) === selectedPcId;
    const cmb = combatants.find(x => x.name === pc.name && x.type === 'ally');
    const curHp = cmb ? cmb.hp : (pc.maxhp || 0);
    const maxHp = cmb ? cmb.maxHp : (pc.maxhp || 0);
    const pct = hpPct(curHp, maxHp);
    const hc = hpColor(pct);
    const conds = (cmb && cmb.conditions) || [];

    html += '<div class="sidebar-pc' + (isYou ? ' is-you' : '') + '">';

    // Name row
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
      '<div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;' +
        'font-family:Cinzel,serif;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;' +
        'background:' + avatarColor(pc.name) + ';border:2px solid ' + (isYou ? 'var(--gold)' : 'rgba(255,255,255,0.12)') + ';">' +
        initials(pc.name) +
      '</div>' +
      '<div style="min-width:0;flex:1;">' +
        '<div class="sidebar-pc-name">' + esc(pc.name) + (isYou ? ' <span style="font-size:10px;color:var(--text-dim);">(You)</span>' : '') + '</div>' +
        '<div class="sidebar-pc-sub">' + esc(pc.cls) + ' Lv' + (pc.level || 1) + '</div>' +
      '</div>' +
    '</div>';

    // HP bar
    html += '<div style="display:flex;align-items:center;gap:6px;">' +
      '<div class="sidebar-hp-bar" style="flex:1;"><div class="sidebar-hp-fill" style="width:' + pct + '%;background:' + hc + ';"></div></div>' +
      '<span class="sidebar-hp-text" style="margin:0;min-width:38px;">' + curHp + '/' + maxHp + '</span>' +
    '</div>';

    // Conditions
    if (conds.length) {
      html += '<div class="sidebar-conds">' + conds.map(c => '<span class="sidebar-cond-tag">' + esc(c) + '</span>').join('') + '</div>';
    }

    // Death saves — private: pips only on YOUR card; others just see Down
    if (curHp <= 0 && maxHp > 0 && !isYou) {
      html += '<div class="sidebar-death-saves"><span style="color:#e05050;">💀 Down</span></div>';
    }
    if (curHp <= 0 && maxHp > 0 && isYou) {
      const successes = cmb ? (cmb.deathSuccess || 0) : 0;
      const failures = cmb ? (cmb.deathFail || 0) : 0;
      html += '<div class="sidebar-death-saves">' +
        '<span style="color:#8fd050;">';
      for (let s = 0; s < 3; s++) {
        html += s < successes ? '\u25CF ' : '\u25CB ';
      }
      html += '</span>' +
        '<span style="color:#e05050;">';
      for (let f = 0; f < 3; f++) {
        html += f < failures ? '\u25CF ' : '\u25CB ';
      }
      html += '</span>' +
      '</div>';
    }

    html += '</div>'; // close sidebar-pc
  });

  html += '</div>'; // close card
  return html;
}

// ══════════════════════════════════════════════════════════════
// FIREBASE LISTENER
// ══════════════════════════════════════════════════════════════
if (dmUid) {
  const statusEl = document.getElementById('pv-status');
  let firstLoad = true;

  onSnapshot(doc(db, 'playerView', dmUid), snap => {
    if (!snap.exists()) {
      statusEl.textContent = 'Waiting for DM...';
      document.getElementById('pv-root').innerHTML =
        '<div style="text-align:center;color:#555;padding:60px 0;font-style:italic;">Waiting for your DM to start the session...</div>';
      return;
    }

    const d = snap.data();
    renderRoot(d);

    // Turn chime + death-save popup, exactly when they matter
    const nowMyTurn = selectedPcId ? isMyTurn(d) : false;
    if (nowMyTurn && !wasMyTurn) {
      pvSound('turn');
      const meNow = myCombatant(d);
      if (!tableMode && meNow && meNow.hp <= 0 && !meNow.isDead && !(meNow.conditions || []).includes('Stable')) {
        const key = (d.currentRound || 0) + ':' + (d.currentTurn || 0);
        if (lastDeathPrompt !== key) {
          lastDeathPrompt = key;
          pvSound('death');
          const ds = meNow.deathSuccess || 0, df = meNow.deathFail || 0;
          let pips = '<span style="color:#8fd050;letter-spacing:3px;">';
          for (let i = 0; i < 3; i++) pips += i < ds ? '●' : '○';
          pips += '</span> <span style="color:#e05050;letter-spacing:3px;">';
          for (let i = 0; i < 3; i++) pips += i < df ? '●' : '○';
          pips += '</span>';
          showOverlay('<div style="text-align:center;">' +
            '<div style="font-family:Cinzel,serif;font-size:20px;color:#ff8080;margin-bottom:6px;">💀 DEATH SAVE</div>' +
            '<div style="font-size:13px;color:var(--text-dim);margin-bottom:8px;">You\'re dying. Roll a d20 — only you and the DM see this.</div>' +
            '<div style="font-size:22px;margin-bottom:12px;">' + pips + '</div>' +
            '<input id="pv-ds-roll" type="number" min="1" max="20" placeholder="d20" style="width:90px;font-size:22px;text-align:center;padding:8px;background:rgba(0,0,0,0.4);border:2px solid rgba(224,80,80,0.5);border-radius:8px;color:var(--parchment);margin-bottom:12px;">' +
            '<div><button class="btn-pv" style="border-color:#e05050;color:#ff8080;" onclick="_pvDeathSave();_pvCloseOverlay()">🎲 Roll Death Save</button></div>' +
          '</div>');
        }
      }
    }
    wasMyTurn = nowMyTurn;

    // 🚫 Your request was refused — show it HERE, not just on the DM screen
    if (d.lastRejection && selectedPcId) {
      const rej = d.lastRejection;
      const mineRej = myUnits(d).some(u => u.id === rej.combatantId);
      if (mineRej && String(rej.id) !== String(window._shownRejId)) {
        window._shownRejId = rej.id;
        if (Date.now() - new Date(rej.ts || 0).getTime() < 15000) {
          closeOverlay(); // kill the "waiting..." spinner
          pvSound('miss');
          showOverlay('<div style="text-align:center;">' +
            '<div style="font-size:26px;margin-bottom:6px;">🚫</div>' +
            '<div style="font-size:15px;color:#ff8080;">' + esc(rej.msg) + '</div>' +
            '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:14px;" onclick="_pvCloseOverlay()">OK</button></div>');
        }
      }
    }

    // ✨⚔ Divine Smite offer: you just connected — burn a slot?
    if (!tableMode && d.pendingSmite && selectedPcId) {
      const meS = myCombatant(d);
      if (meS && d.pendingSmite.attackerId === meS.id && String(d.pendingSmite.id) !== String(window._shownSmiteId)) {
        window._shownSmiteId = d.pendingSmite.id;
        const ps = d.pendingSmite;
        let shtml = '<div style="text-align:center;font-family:Cinzel,serif;font-size:18px;color:#ffe066;margin-bottom:4px;">✨⚔ DIVINE SMITE?</div>' +
          '<div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:12px;">Your blade found ' + esc(ps.targetName) + (ps.crit ? ' — a CRIT (smite dice double!)' : '') + '. Burn a slot for radiant fury?</div>';
        (ps.slots || []).forEach(o => {
          const dice = Math.min(5, 1 + o.level) * (ps.crit ? 2 : 1);
          shtml += '<button class="pv-target-btn" ' + (o.free <= 0 ? 'disabled' : '') + ' data-smite="' + o.level + '" style="border-color:rgba(255,224,102,0.4);">' +
            '<span style="color:#ffe066;">Level ' + o.level + ' → +' + dice + 'd8 radiant</span>' +
            '<span style="margin-left:auto;font-size:12px;color:' + (o.free > 0 ? '#8fd050' : '#555') + ';">' + o.free + '/' + o.max + '</span></button>';
        });
        shtml += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" id="pv-smite-pass">Save it</button>';
        showOverlay(shtml);
        document.querySelectorAll('[data-smite]').forEach(btn => btn.addEventListener('click', () => {
          closeOverlay();
          sendPlayerRequest({ type: 'smite', smiteId: ps.id, combatantId: meS.id, slotLevel: parseInt(btn.dataset.smite), ts: Date.now() });
          showWaiting('✨⚔ SMITE!');
        }));
        const spass = document.getElementById('pv-smite-pass');
        if (spass) spass.addEventListener('click', () => {
          closeOverlay();
          sendPlayerRequest({ type: 'smite', smiteId: ps.id, combatantId: meS.id, accept: false, ts: Date.now() });
        });
      }
    }
    if (!d.pendingSmite && window._shownSmiteId) {
      const cardS = document.querySelector('.pv-overlay-card');
      if (cardS && cardS.textContent.includes('DIVINE SMITE?')) { closeOverlay(); window._shownSmiteId = null; }
    }

    // 🎲 Saving throw — the player rolls their own d20
    if (!tableMode && d.pendingSave && selectedPcId) {
      const meSv = myCombatant(d);
      if (meSv && d.pendingSave.combatantId === meSv.id && String(d.pendingSave.id) !== String(window._shownSaveId)) {
        window._shownSaveId = d.pendingSave.id;
        pvSound('turn');
        showSavePrompt(d.pendingSave);
      }
    }
    if (!d.pendingSave && window._shownSaveId) {
      const cardV = document.querySelector('.pv-overlay-card');
      if (cardV && cardV.textContent.includes('SAVING THROW')) closeOverlay();
      window._shownSaveId = null;
    }

    // 💥 Your attack HIT — roll your own damage
    if (!tableMode && d.pendingDamage && selectedPcId) {
      const meDmg = myCombatant(d);
      if (meDmg && d.pendingDamage.combatantId === meDmg.id && String(d.pendingDamage.id) !== String(window._shownDamageId)) {
        window._shownDamageId = d.pendingDamage.id;
        pvSound(d.pendingDamage.crit ? 'crit' : 'hit');
        showDamagePrompt(d.pendingDamage);
      }
    }
    if (!d.pendingDamage && window._shownDamageId) {
      const cardD = document.querySelector('.pv-overlay-card');
      if (cardD && cardD.textContent.includes('ROLL DAMAGE')) closeOverlay();
      window._shownDamageId = null;
    }

    // ⚡ Reaction offer: Shield / Hellish Rebuke on the victim's phone
    if (!tableMode && d.pendingReaction && selectedPcId) {
      const me2 = myCombatant(d);
      if (me2 && d.pendingReaction.targetId === me2.id && String(d.pendingReaction.id) !== String(window._shownReactionId)) {
        window._shownReactionId = d.pendingReaction.id;
        pvSound('turn');
        const pr = d.pendingReaction;
        let rhtml = '<div style="text-align:center;font-family:Cinzel,serif;font-size:18px;color:#ffe066;margin-bottom:4px;">⚡ REACTION?</div>' +
          '<div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:12px;">' + esc(pr.attackerName) + ' just hit you' + (pr.amount ? ' for ' + pr.amount : '') + '. Quick — before the next turn!</div>';
        pr.offers.forEach(o => {
          rhtml += '<button class="pv-target-btn" data-react="' + esc(o.spell) + '" style="border-color:rgba(255,224,102,0.4);">' +
            '<span style="color:#ffe066;">✨ ' + esc(o.spell) + '</span>' +
            '<span style="margin-left:auto;font-size:11px;color:var(--text-dim);max-width:60%;text-align:right;">' + esc(o.desc) + '</span></button>';
        });
        rhtml += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" id="pv-react-pass">Pass</button>';
        showOverlay(rhtml);
        document.querySelectorAll('[data-react]').forEach(btn => btn.addEventListener('click', () => {
          closeOverlay();
          sendPlayerRequest({ type: 'reaction', reactionId: pr.id, combatantId: me2.id, spell: btn.dataset.react, accept: true, ts: Date.now() });
          showWaiting('⚡ ' + btn.dataset.react + '!');
        }));
        const pass = document.getElementById('pv-react-pass');
        if (pass) pass.addEventListener('click', () => {
          closeOverlay();
          sendPlayerRequest({ type: 'reaction', reactionId: pr.id, combatantId: me2.id, accept: false, ts: Date.now() });
        });
      }
    }
    // Offer expired (someone else acted)? Close the popup — too late.
    if (!d.pendingReaction && window._shownReactionId) {
      const card = document.querySelector('.pv-overlay-card');
      if (card && card.textContent.includes('REACTION?')) {
        closeOverlay();
        window._shownReactionId = null;
      }
    }

    // Action result feed → hit/miss/heal animation for everyone watching
    if (d.actionFeed && String(d.actionFeed.id) !== String(lastFeedId)) {
      const fresh = Date.now() - new Date(d.actionFeed.ts || 0).getTime() < 30000;
      lastFeedId = d.actionFeed.id;
      sessionStorage.setItem('pv_last_feed', String(lastFeedId));
      if (fresh) showActionResult(d.actionFeed);
    }

    const now = new Date();
    statusEl.textContent = (firstLoad ? 'Live ' : '') +
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    statusEl.style.color = '#8fd050';
    firstLoad = false;
  }, err => {
    console.error('Snapshot error:', err);
    document.getElementById('pv-status').textContent = 'Connection lost';
    document.getElementById('pv-status').style.color = '#e05050';
  });
}
</script>
