<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player View — DM Grimoire</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a0f0a;
    --parchment: #f0e6cc;
    --gold: #d4a820;
    --gold-light: #f0c030;
    --gold-dim: #9a7a18;
    --blood: #8b1a1a;
    --blood-light: #e05050;
    --text-dim: #a89060;
    --text-secondary: #d4b880;
    --border: #6a4a28;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0d0804;
    color: #d4b880;
    font-family: 'Crimson Text', serif;
    font-size: 19px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,150,10,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,26,26,0.06) 0%, transparent 50%);
  }
  body { padding: 0; overflow-x: hidden; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 3px; }

  /* ===== HEADER ===== */
  .pv-header {
    background: linear-gradient(180deg, rgba(42,26,14,0.98) 0%, rgba(20,12,6,0.98) 100%);
    border-bottom: 2px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .pv-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(14px, 3vw, 20px);
    color: var(--gold);
    text-shadow: 0 0 15px rgba(201,150,10,0.4);
  }
  .pv-status {
    font-size: 11px;
    font-family: 'Cinzel', serif;
    color: #8fd050;
  }

  /* ===== TWO-COLUMN LAYOUT ===== */
  .pv-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
    min-height: calc(100vh - 60px);
  }

  .pv-main {
    min-width: 0;
  }

  .pv-sidebar {
    min-width: 0;
  }

  /* ===== CHARACTER SELECTION ===== */
  .select-screen {
    text-align: center;
    padding: 40px 16px;
    grid-column: 1 / -1;
  }
  .select-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 4vw, 28px);
    color: var(--gold);
    margin-bottom: 8px;
  }
  .select-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 32px;
  }
  .select-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    max-width: 700px;
    margin: 0 auto;
  }
  .select-card {
    background: linear-gradient(135deg, rgba(38,24,10,0.98), rgba(28,16,6,1));
    border: 2px solid rgba(212,175,55,0.2);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }
  .select-card:hover {
    border-color: rgba(212,175,55,0.6);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(212,175,55,0.15);
  }
  .select-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 22px; font-weight: 700;
    color: #fff;
    border: 3px solid rgba(255,255,255,0.15);
  }
  .select-card-name {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .select-card-info {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ===== TAB TOGGLE ===== */
  .pv-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(212,175,55,0.25);
  }
  .pv-tab {
    flex: 1;
    padding: 10px 16px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-align: center;
    cursor: pointer;
    background: rgba(0,0,0,0.3);
    color: var(--text-dim);
    border: none;
    transition: all 0.2s;
  }
  .pv-tab:hover {
    background: rgba(212,175,55,0.08);
    color: var(--gold);
  }
  .pv-tab.active {
    background: rgba(212,175,55,0.15);
    color: var(--gold);
    box-shadow: inset 0 -2px 0 var(--gold);
  }

  /* ===== CARDS ===== */
  .card {
    background: linear-gradient(135deg, rgba(38,24,10,0.98), rgba(28,16,6,1));
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .card-section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(212,175,55,0.15);
  }

  /* ===== HP BAR ===== */
  .hp-bar-wrap {
    background: rgba(0,0,0,0.4);
    border-radius: 5px;
    height: 10px;
    overflow: hidden;
    margin: 8px 0;
  }
  .hp-bar {
    height: 100%;
    border-radius: 5px;
    transition: width 0.6s ease;
  }

  /* ===== ABILITY SCORES ===== */
  .ability-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin: 12px 0;
  }
  .ability-box {
    text-align: center;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 6px;
    padding: 8px 4px;
  }
  .ability-mod {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-light);
  }
  .ability-score {
    font-size: 11px;
    color: var(--text-dim);
  }
  .ability-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ===== SKILLS ===== */
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 12px;
  }
  .skill-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 4px;
    border-radius: 3px;
  }
  .skill-icon { font-size: 12px; width: 16px; text-align: center; flex-shrink: 0; }
  .skill-name { font-size: 12px; flex: 1; }
  .skill-bonus { font-size: 12px; font-family: 'Cinzel', serif; font-weight: 600; min-width: 28px; text-align: right; }

  /* ===== SPELL PIPS ===== */
  .pip {
    display: inline-block;
    width: 16px; height: 16px;
    border-radius: 50%;
    margin: 2px;
    cursor: default;
  }

  /* ===== MESSAGES ===== */
  .msg-banner {
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
    font-size: 15px;
    line-height: 1.5;
  }
  .party-msg {
    background: rgba(212,175,55,0.1);
    border: 1px solid rgba(212,175,55,0.35);
    color: #ffe066;
  }
  .personal-msg {
    background: rgba(100,180,255,0.08);
    border: 1px solid rgba(100,180,255,0.35);
    color: #b8d8ff;
  }

  /* ===== CONDITIONS ===== */
  .cond-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(255,100,100,0.12);
    border: 1px solid rgba(255,100,100,0.3);
    color: #ff9090;
    margin: 2px 2px 2px 0;
  }

  /* ===== SIDEBAR PARTY CARDS ===== */
  .sidebar-pc {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .sidebar-pc.is-you {
    border-color: rgba(212,175,55,0.4);
    background: rgba(212,175,55,0.06);
  }
  .sidebar-pc-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-pc-sub {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .sidebar-hp-bar {
    background: rgba(0,0,0,0.4);
    border-radius: 3px;
    height: 6px;
    overflow: hidden;
  }
  .sidebar-hp-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .sidebar-hp-text {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    text-align: right;
  }
  .sidebar-conds {
    margin-top: 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .sidebar-cond-tag {
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    background: rgba(255,100,100,0.12);
    border: 1px solid rgba(255,100,100,0.3);
    color: #ff9090;
  }
  .sidebar-death-saves {
    margin-top: 5px;
    font-size: 10px;
    display: flex;
    gap: 8px;
  }

  /* ===== INITIATIVE ROWS (in main panel) ===== */
  .init-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
  }
  .init-current {
    background: rgba(212,175,55,0.12);
    border: 1px solid rgba(212,175,55,0.35);
  }
  .init-row:not(.init-current) {
    background: rgba(0,0,0,0.2);
  }

  /* ===== BUTTONS ===== */
  .btn-pv {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid rgba(212,175,55,0.3);
    background: rgba(212,175,55,0.1);
    color: var(--gold);
    transition: all 0.2s;
  }
  .btn-pv:hover {
    background: rgba(212,175,55,0.2);
    border-color: rgba(212,175,55,0.5);
  }

  /* ===== INSPIRATION ===== */
  .insp-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.45);
    color: #ffd700;
  }

  /* ===== COMBAT BANNER ===== */
  .combat-banner {
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 12px;
  }
  .combat-active {
    background: rgba(224,80,80,0.12);
    border: 1px solid rgba(224,80,80,0.35);
    color: #ff9090;
  }
  .combat-inactive {
    background: rgba(80,180,80,0.08);
    border: 1px solid rgba(80,180,80,0.2);
    color: #8fd050;
  }

  /* ===== YOUR TURN + PLAYABLE ACTIONS ===== */
  .your-turn-banner {
    background: linear-gradient(90deg, rgba(212,175,55,0.25), rgba(212,175,55,0.08), rgba(212,175,55,0.25));
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 12px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.12em;
    animation: turnPulse 1.6s ease-in-out infinite;
  }
  @keyframes turnPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(212,175,55,0.25); }
    50% { box-shadow: 0 0 22px rgba(212,175,55,0.55); }
  }
  .pv-action-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 5px;
  }
  .pv-action-use {
    padding: 5px 14px;
    border-radius: 5px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--gold);
    background: rgba(212,175,55,0.18);
    color: var(--gold-light);
  }
  .pv-action-use:disabled {
    border-color: rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: #555;
    cursor: not-allowed;
  }
  .pv-overlay {
    position: fixed; inset: 0; z-index: 9000;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .pv-overlay-card {
    background: linear-gradient(135deg, rgba(38,24,10,0.99), rgba(28,16,6,1));
    border: 2px solid rgba(212,175,55,0.4);
    border-radius: 12px;
    padding: 22px;
    max-width: 380px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .pv-target-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.3);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    text-align: left;
  }
  .pv-target-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(212,175,55,0.08); }
  .pv-target-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  /* Roll result animation */
  .pv-result-overlay {
    position: fixed; inset: 0; z-index: 9500;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .pv-result-card {
    background: rgba(15,9,4,0.96);
    border-radius: 14px;
    padding: 26px 34px;
    text-align: center;
    animation: pvPop 0.35s cubic-bezier(0.2, 1.4, 0.4, 1);
  }
  .pv-result-card.hit { border: 3px solid #4caf50; box-shadow: 0 0 40px rgba(76,175,80,0.5); }
  .pv-result-card.miss { border: 3px solid #e05050; box-shadow: 0 0 40px rgba(224,80,80,0.5); }
  .pv-result-card.heal { border: 3px solid #64b4ff; box-shadow: 0 0 40px rgba(100,180,255,0.5); }
  @keyframes pvPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pv-roll-num {
    font-family: 'Cinzel', serif; font-size: 44px; font-weight: 700; color: var(--parchment);
    display: inline-block; animation: pvPop 0.3s ease-out;
  }
  .pv-roll-bonus {
    font-family: 'Cinzel', serif; font-size: 26px; color: var(--gold);
    display: inline-block; opacity: 0; animation: pvSlideIn 0.4s ease-out 0.5s forwards;
  }
  .pv-roll-total {
    font-family: 'Cinzel', serif; font-size: 34px; font-weight: 700;
    display: inline-block; opacity: 0; animation: pvSlideIn 0.4s ease-out 1.0s forwards;
  }
  @keyframes pvSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .pv-verdict {
    font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; letter-spacing: 0.15em;
    margin-top: 10px; opacity: 0; animation: pvSlideIn 0.4s ease-out 1.5s forwards;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 720px) {
    .pv-layout {
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 10px;
    }
    .pv-sidebar {
      order: -1;
    }
    .sidebar-pc {
      display: inline-block;
      width: calc(50% - 4px);
      vertical-align: top;
    }
    .ability-grid { gap: 4px; }
    .ability-mod { font-size: 15px; }
    .ability-box { padding: 6px 2px; }
    .skills-grid { grid-template-columns: 1fr; }
    .select-grid { grid-template-columns: 1fr; }
    .card { padding: 14px; }
  }
</style>
</head>
<body>

<div class="pv-header">
  <div class="pv-title">DM Grimoire</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="pv-status" id="pv-status">Connecting...</span>
  </div>
</div>

<div id="pv-root">
  <div style="text-align:center;color:#555;padding:60px 0;font-style:italic;">Connecting to your DM...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAHeoD6eKkxm7ezwvBcEt5W6S7nVqZYknY",
  authDomain: "dm-grimoire-20df0.firebaseapp.com",
  projectId: "dm-grimoire-20df0"
});
const db = getFirestore(app);

// ── Get DM UID from URL ──────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const dmUid = params.get('dm');
if (!dmUid) {
  document.getElementById('pv-root').innerHTML =
    '<div style="text-align:center;padding:60px 20px;">' +
    '<div style="font-size:48px;margin-bottom:16px;">📖</div>' +
    '<div style="font-family:Cinzel,serif;font-size:22px;color:var(--gold);margin-bottom:8px;">No DM Link Found</div>' +
    '<div style="color:var(--text-dim);font-size:14px;">Ask your DM for the Player View link.</div></div>';
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const AVATAR_COLORS = ['#7b3a14','#1e4d7a','#3a6b47','#6b2d5e','#7a5c10','#1d5e6b','#6b3a1e','#2d4e7a'];
function avatarColor(name) {
  let h = 0;
  for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

function initials(name) {
  return String(name).split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function mod(score) { return Math.floor((score - 10) / 2); }
function fmtMod(n) { return n >= 0 ? '+' + n : '' + n; }

function profBonus(level) {
  if (level <= 4) return 2;
  if (level <= 8) return 3;
  if (level <= 12) return 4;
  if (level <= 16) return 5;
  return 6;
}

function hpColor(pct) {
  if (pct > 50) return '#4caf50';
  if (pct > 25) return '#ff9800';
  return '#f44336';
}

function hpPct(cur, max) {
  return Math.max(0, Math.min(100, (cur / (max || 1)) * 100));
}

// ── Skills data ──────────────────────────────────────────────
const SKILL_LIST = [
  { key: 'acrobatics',      label: 'Acrobatics',      ability: 'dex' },
  { key: 'animal_handling',  label: 'Animal Handling',  ability: 'wis' },
  { key: 'arcana',          label: 'Arcana',           ability: 'int' },
  { key: 'athletics',       label: 'Athletics',        ability: 'str' },
  { key: 'deception',       label: 'Deception',        ability: 'cha' },
  { key: 'history',         label: 'History',          ability: 'int' },
  { key: 'insight',         label: 'Insight',          ability: 'wis' },
  { key: 'intimidation',    label: 'Intimidation',     ability: 'cha' },
  { key: 'investigation',   label: 'Investigation',    ability: 'int' },
  { key: 'medicine',        label: 'Medicine',         ability: 'wis' },
  { key: 'nature',          label: 'Nature',           ability: 'int' },
  { key: 'perception',      label: 'Perception',       ability: 'wis' },
  { key: 'performance',     label: 'Performance',      ability: 'cha' },
  { key: 'persuasion',      label: 'Persuasion',       ability: 'cha' },
  { key: 'religion',        label: 'Religion',         ability: 'int' },
  { key: 'sleight_of_hand', label: 'Sleight of Hand',  ability: 'dex' },
  { key: 'stealth',         label: 'Stealth',          ability: 'dex' },
  { key: 'survival',        label: 'Survival',         ability: 'wis' }
];

// ── State ────────────────────────────────────────────────────
let selectedPcId = sessionStorage.getItem('pv_selected_pc') || null;
let latestData = null;
let activeTab = 'character'; // 'character' | 'initiative' | 'map'
let moveSelecting = false;   // tap-to-move: own token selected
let lastFeedId = sessionStorage.getItem('pv_last_feed') || null;
const MOVE_SPEED_FT = 30;

// ── Playable-turn helpers ────────────────────────────────────
function myPC(d) {
  return (d.party || []).find(p => String(p.id) === selectedPcId) || null;
}
function myCombatant(d) {
  const pc = myPC(d);
  if (!pc) return null;
  return (d.combatants || []).find(c => c.type === 'ally' && c.name === pc.name) || null;
}
function isMyTurn(d) {
  const me = myCombatant(d);
  if (!me || !d.combatActive) return false;
  const cur = (d.combatants || [])[d.currentTurn >= 0 ? d.currentTurn : 0];
  return !!cur && cur.id === me.id;
}
function distFt(a, b) {
  // 5-10-5 rule, same math as the DM's measure tool
  const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
  const diag = Math.min(dx, dy), straight = Math.max(dx, dy) - diag;
  return straight * 5 + diag * 5 + Math.floor(diag / 2) * 5;
}

// Mirror of the DM engine's condition rules (kept in sync with player-actions.js)
const PV_CONDITION_EFFECTS = {
  'Prone':        { meleeAttackersAdv: true, rangedAttackersDis: true, selfDis: true, halfSpeed: true },
  'Poisoned':     { selfDis: true },
  'Blinded':      { attackersAdv: true, selfDis: true },
  'Restrained':   { attackersAdv: true, selfDis: true, speedZero: true },
  'Grappled':     { speedZero: true },
  'Paralyzed':    { attackersAdv: true, autoCritMelee: true, cantAct: true, speedZero: true },
  'Stunned':      { attackersAdv: true, cantAct: true, speedZero: true },
  'Unconscious':  { attackersAdv: true, autoCritMelee: true, cantAct: true, speedZero: true },
  'Incapacitated':{ cantAct: true },
  'Invisible':    { attackersDis: true, selfAdv: true },
  'Frightened':   { selfDis: true },
  'Petrified':    { attackersAdv: true, cantAct: true, speedZero: true },
  'Exhaustion':   { selfDis: true }
};

function pvCanAct(c) {
  for (const cn of (c.conditions || [])) {
    const eff = PV_CONDITION_EFFECTS[cn];
    if (eff && eff.cantAct) return { ok: false, reason: cn };
  }
  if (c.hp <= 0) return { ok: false, reason: 'at 0 HP' };
  return { ok: true };
}

function pvSpeedFt(c, baseFt) {
  let speed = baseFt || 30;
  for (const cn of (c.conditions || [])) {
    const eff = PV_CONDITION_EFFECTS[cn];
    if (!eff) continue;
    if (eff.speedZero) return 0;
    if (eff.halfSpeed) speed = Math.floor(speed / 2);
  }
  return speed;
}

// Advantage/disadvantage preview so the player knows HOW to roll
function pvAttackContext(attacker, target, action) {
  const isMelee = (parseInt(action.range) || 5) <= 5;
  let adv = false, dis = false;
  const notes = [];
  (attacker.conditions || []).forEach(cn => {
    const eff = PV_CONDITION_EFFECTS[cn]; if (!eff) return;
    if (eff.selfDis) { dis = true; notes.push('you are ' + cn.toLowerCase()); }
    if (eff.selfAdv) { adv = true; notes.push('you are ' + cn.toLowerCase()); }
  });
  (target.conditions || []).forEach(cn => {
    const eff = PV_CONDITION_EFFECTS[cn]; if (!eff) return;
    if (eff.attackersAdv) { adv = true; notes.push('target is ' + cn.toLowerCase()); }
    if (eff.attackersDis) { dis = true; notes.push('target is ' + cn.toLowerCase()); }
    if (eff.meleeAttackersAdv && isMelee) { adv = true; notes.push('target is ' + cn.toLowerCase() + ' (melee)'); }
    if (eff.rangedAttackersDis && !isMelee) { dis = true; notes.push('target is ' + cn.toLowerCase() + ' (ranged)'); }
  });
  const net = (adv && dis) ? 0 : adv ? 1 : dis ? -1 : 0;
  return { net, notes };
}

async function sendPlayerRequest(payload) {
  try {
    await addDoc(collection(db, 'playerActions', dmUid, 'requests'), payload);
    return true;
  } catch(e) {
    alert('Could not send to your DM: ' + e.message + '\n\nAsk your DM to update the Firestore security rules (playerActions).');
    return false;
  }
}

// ── Use an action: pick target → (attack: enter d20) → send ──
function useAction(actionIdx) {
  const d = latestData;
  if (!d || !isMyTurn(d)) return;
  const pc = myPC(d), me = myCombatant(d);
  const a = (pc.actions || [])[actionIdx];
  if (!a) return;
  const can = pvCanAct(me);
  if (!can.ok) {
    showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">You can\'t act — you are ' + esc(can.reason) + '.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
    return;
  }
  const m = d.mapState || null;
  const myPos = m && m.tokens ? m.tokens[me.id] : null;

  const candidates = (d.combatants || []).filter(c => {
    if (c.hidden) return false;
    if (a.kind === 'heal') return c.type === 'ally'; // can heal yourself and downed allies
    return c.id !== me.id && c.hp > 0;
  });

  let html = '<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);margin-bottom:4px;">' + esc(a.name) + '</div>' +
    '<div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;">' +
      (a.kind === 'heal' ? '❤ Heal' : '⚔ Attack') + ' · range ' + a.range + ' ft · ' + esc(a.dice) +
      (a.kind !== 'heal' ? ' · +' + a.bonus + ' to hit' : '') +
    '</div>' +
    '<div style="font-size:11px;font-family:Cinzel,serif;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:8px;">CHOOSE TARGET</div>';

  candidates.forEach(c => {
    const tPos = m && m.tokens ? m.tokens[c.id] : null;
    let distLabel = '', outOfRange = false;
    if (myPos && tPos) {
      const ft = distFt(myPos, tPos);
      outOfRange = ft > (a.range || 5);
      distLabel = '<span style="margin-left:auto;font-size:12px;color:' + (outOfRange ? '#e05050' : '#8fd050') + ';">' + ft + ' ft' + (outOfRange ? ' — too far' : '') + '</span>';
    }
    const hpPctV = Math.max(0, Math.min(100, (c.hp / (c.maxHp || 1)) * 100));
    html += '<button class="pv-target-btn" ' + (outOfRange ? 'disabled' : '') + ' data-target="' + c.id + '">' +
      '<span style="color:' + (c.type === 'ally' ? '#90c8ff' : '#ff9090') + ';">' + esc(c.name) + '</span>' +
      '<span style="font-size:12px;color:var(--text-dim);">' + c.hp + '/' + c.maxHp + ' HP</span>' +
      distLabel +
    '</button>';
  });
  html += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" onclick="_pvCloseOverlay()">Cancel</button>';

  showOverlay(html);
  document.querySelectorAll('.pv-target-btn[data-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = parseFloat(btn.dataset.target);
      closeOverlay();
      if (a.kind === 'heal') {
        sendPlayerRequest({ type: 'action', combatantId: me.id, targetId, action: a, ts: Date.now() });
        showWaiting('❤ Casting ' + a.name + '...');
      } else {
        const target = (d.combatants || []).find(c => c.id === targetId);
        askForRoll(a, me.id, targetId, target ? pvAttackContext(me, target, a) : { net: 0, notes: [] });
      }
    });
  });
}
window._pvUseAction = useAction;

// Tap an enemy on the map → pick which action to hit them with
function openMapAttack(target) {
  const d = latestData;
  const pc = myPC(d), me = myCombatant(d);
  const can = pvCanAct(me);
  if (!can.ok) {
    showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">You can\'t act — you are ' + esc(can.reason) + '.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
    return;
  }
  const acts = (pc.actions || []).filter(a => a.kind !== 'heal');
  if (!acts.length) {
    showOverlay('<div style="text-align:center;font-size:14px;color:var(--text-dim);">No attacks on your sheet yet — ask your DM to add Combat Actions to your character.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
    return;
  }
  const m = d.mapState;
  const myPos = (m.tokens || {})[me.id];
  const tPos = (m.tokens || {})[target.id];
  const ft = (myPos && tPos) ? distFt(myPos, tPos) : null;
  let html = '<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);margin-bottom:4px;">⚔ Attack ' + esc(target.name) + '</div>' +
    '<div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">' + target.hp + '/' + target.maxHp + ' HP' + (ft !== null ? ' · ' + ft + ' ft away' : '') + '</div>';
  acts.forEach((a, i) => {
    const idx = (pc.actions || []).indexOf(a);
    const outOfRange = ft !== null && ft > (a.range || 5);
    html += '<button class="pv-target-btn" ' + (outOfRange ? 'disabled' : '') + ' data-mattack="' + idx + '">' +
      '<span>⚔ ' + esc(a.name) + '</span>' +
      '<span style="margin-left:auto;font-size:12px;color:' + (outOfRange ? '#e05050' : 'var(--text-dim)') + ';">' + (a.range || 5) + ' ft · ' + esc(a.dice || '') + (outOfRange ? ' — too far' : '') + '</span>' +
    '</button>';
  });
  html += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" onclick="_pvCloseOverlay()">Cancel</button>';
  showOverlay(html);
  document.querySelectorAll('[data-mattack]').forEach(btn => {
    btn.addEventListener('click', () => {
      const a = (pc.actions || [])[parseInt(btn.dataset.mattack)];
      closeOverlay();
      askForRoll(a, me.id, target.id, pvAttackContext(me, target, a));
    });
  });
}

function endMyTurn() {
  const d = latestData;
  if (!d || !isMyTurn(d)) return;
  const me = myCombatant(d);
  sendPlayerRequest({ type: 'endTurn', combatantId: me.id, ts: Date.now() });
  moveSelecting = false;
}
window._pvEndTurn = endMyTurn;

function askForRoll(a, myId, targetId, ctx) {
  ctx = ctx || { net: 0, notes: [] };
  let advBanner = '';
  if (ctx.net > 0) {
    advBanner = '<div style="background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.45);border-radius:6px;padding:8px 12px;margin-bottom:12px;text-align:center;">' +
      '<div style="font-family:Cinzel,serif;font-size:14px;color:#6fdc75;font-weight:700;">⬆ ADVANTAGE</div>' +
      '<div style="font-size:12px;color:var(--text-dim);">' + esc(ctx.notes.join(', ')) + '<br>Roll <strong style="color:#6fdc75;">two d20s</strong> and enter the <strong>higher</strong>.</div></div>';
  } else if (ctx.net < 0) {
    advBanner = '<div style="background:rgba(224,80,80,0.12);border:1px solid rgba(224,80,80,0.45);border-radius:6px;padding:8px 12px;margin-bottom:12px;text-align:center;">' +
      '<div style="font-family:Cinzel,serif;font-size:14px;color:#ff8080;font-weight:700;">⬇ DISADVANTAGE</div>' +
      '<div style="font-size:12px;color:var(--text-dim);">' + esc(ctx.notes.join(', ')) + '<br>Roll <strong style="color:#ff8080;">two d20s</strong> and enter the <strong>lower</strong>.</div></div>';
  } else if (ctx.notes.length) {
    advBanner = '<div style="font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:10px;">' + esc(ctx.notes.join(', ')) + ' — roll normally.</div>';
  }
  const html = advBanner +
    '<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);margin-bottom:10px;text-align:center;">🎲 Roll your d20!</div>' +
    '<div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:14px;">Roll a real d20 and enter the <strong style="color:var(--parchment);">raw number</strong> — no modifiers, we\'ll add your +' + a.bonus + ' for you.</div>' +
    '<input id="pv-roll-input" type="number" min="1" max="20" placeholder="1–20" style="width:100%;font-size:28px;text-align:center;padding:10px;background:rgba(0,0,0,0.4);border:2px solid rgba(212,175,55,0.4);border-radius:8px;color:var(--parchment);font-family:Cinzel,serif;margin-bottom:12px;">' +
    '<div style="display:flex;gap:8px;">' +
      '<button class="btn-pv" style="flex:1;justify-content:center;" id="pv-roll-submit">⚔ Attack!</button>' +
      '<button class="btn-pv" style="justify-content:center;" onclick="_pvCloseOverlay()">Cancel</button>' +
    '</div>';
  showOverlay(html);
  const inp = document.getElementById('pv-roll-input');
  inp.focus();
  const submit = () => {
    const roll = parseInt(inp.value);
    if (!roll || roll < 1 || roll > 20) { inp.style.borderColor = '#e05050'; return; }
    closeOverlay();
    sendPlayerRequest({ type: 'action', combatantId: myId, targetId, action: a, roll, ts: Date.now() });
    showWaiting('⚔ ' + a.name + ' — you rolled ' + roll + '...');
  };
  document.getElementById('pv-roll-submit').addEventListener('click', submit);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

// ── Overlay plumbing ─────────────────────────────────────────
function showOverlay(innerHtml) {
  closeOverlay();
  const ov = document.createElement('div');
  ov.className = 'pv-overlay';
  ov.id = 'pv-overlay';
  ov.innerHTML = '<div class="pv-overlay-card">' + innerHtml + '</div>';
  ov.addEventListener('click', e => { if (e.target === ov) closeOverlay(); });
  document.body.appendChild(ov);
}
function closeOverlay() {
  const ov = document.getElementById('pv-overlay');
  if (ov) ov.remove();
}
window._pvCloseOverlay = closeOverlay;

let waitingTimeout = null;
function showWaiting(msg) {
  showOverlay('<div style="text-align:center;font-size:15px;color:var(--text-dim);padding:10px;">' + esc(msg) + '<br><span style="font-size:12px;">waiting for the result...</span></div>');
  clearTimeout(waitingTimeout);
  waitingTimeout = setTimeout(closeOverlay, 8000); // failsafe
}

// ── Action result animation (fires from the Firebase feed) ──
function showActionResult(r) {
  closeOverlay();
  const wrap = document.createElement('div');
  wrap.className = 'pv-result-overlay';
  let inner = '';
  const cls = r.kind === 'heal' ? 'heal' : (r.hit ? 'hit' : 'miss');
  inner += '<div class="pv-result-card ' + cls + '">';
  inner += '<div style="font-size:13px;color:var(--text-dim);margin-bottom:8px;">' + esc(r.attacker) + ' → ' + esc(r.target) + ' · ' + esc(r.actionName || '') + '</div>';
  if (r.kind === 'attack') {
    inner += '<div>' +
      '<span class="pv-roll-num">' + r.roll + '</span>' +
      '<span class="pv-roll-bonus"> + ' + r.bonus + ' </span>' +
      '<span class="pv-roll-total" style="color:' + (r.hit ? '#4caf50' : '#e05050') + ';"> = ' + r.total + '</span>' +
    '</div>';
    inner += '<div style="font-size:12px;color:var(--text-dim);opacity:0;animation:pvSlideIn 0.4s ease-out 1.0s forwards;">vs AC ' + r.targetAC + '</div>';
    inner += '<div class="pv-verdict" style="color:' + (r.hit ? '#4caf50' : '#e05050') + ';">' +
      (r.crit ? '💥 CRITICAL HIT!' : r.hit ? '⚔ HIT!' : '🛡 MISS') +
      (r.hit && r.amount !== undefined ? '<div style="font-size:17px;margin-top:4px;">' + r.amount + (r.damageType ? ' ' + esc(r.damageType) : '') + ' damage</div>' : '') +
    '</div>';
  } else {
    inner += '<div class="pv-roll-num" style="color:#64b4ff;">+' + r.amount + '</div>';
    inner += '<div class="pv-verdict" style="color:#64b4ff;">❤ HEALED</div>';
  }
  // Engine notes: resistances, saves, conditions applied
  if (r.notes && r.notes.length) {
    inner += '<div style="font-size:12px;color:var(--text-secondary);margin-top:10px;opacity:0;animation:pvSlideIn 0.4s ease-out 1.9s forwards;max-width:280px;">' +
      r.notes.map(n => '• ' + esc(n)).join('<br>') + '</div>';
  }
  if (r.appliedCondition) {
    inner += '<div style="font-family:Cinzel,serif;font-size:15px;color:#ffb450;margin-top:8px;opacity:0;animation:pvSlideIn 0.4s ease-out 2.2s forwards;">⚡ ' + esc(r.target) + ' is ' + esc(r.appliedCondition) + '!</div>';
  }
  inner += '</div>';
  wrap.innerHTML = inner;
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 4000);
}

// ── Tap-to-move on the map (your turn only) ──────────────────
function bindMapInteraction() {
  const canvas = document.getElementById('pv-map-canvas');
  if (!canvas || canvas._bound) return;
  canvas._bound = true;
  canvas.addEventListener('click', e => {
    const d = latestData;
    if (!d || !isMyTurn(d) || !d.mapState) return;
    const me = myCombatant(d);
    const m = d.mapState;
    const myPos = (m.tokens || {})[me.id];
    if (!myPos) return;
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width) / m.cell);
    const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height) / m.cell);

    const pc = myPC(d);
    const speed = pvSpeedFt(me, (pc && pc.speed) || 30);

    // Tap an enemy token → attack it from the map
    if (!moveSelecting) {
      const tapped = (d.combatants || []).find(c => {
        if (c.hidden || c.id === me.id) return false;
        const pos = (m.tokens || {})[c.id];
        return pos && pos.x === x && pos.y === y;
      });
      if (tapped && tapped.type !== 'ally' && tapped.hp > 0) {
        openMapAttack(tapped);
        return;
      }
    }

    if (!moveSelecting) {
      // First tap must land on your own token
      if (x === myPos.x && y === myPos.y) {
        if (speed === 0) {
          showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">You can\'t move — ' + esc((me.conditions || []).join(', ') || 'speed 0') + '.</div>' +
            '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
          return;
        }
        moveSelecting = true;
        drawPlayerMap(d);
      }
      return;
    }
    // Second tap: destination
    moveSelecting = false;
    if (x === myPos.x && y === myPos.y) { drawPlayerMap(d); return; }
    const ft = distFt(myPos, { x, y });
    if (ft > speed) {
      drawPlayerMap(d);
      showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">That\'s ' + ft + ' ft — your speed is ' + speed + ' ft' + (speed < ((pc && pc.speed) || 30) ? ' (' + esc((me.conditions || []).join(', ')) + ')' : '') + '.</div>' +
        '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
      return;
    }
    sendPlayerRequest({ type: 'move', combatantId: me.id, x, y, baseSpeed: (pc && pc.speed) || 30, ts: Date.now() });
    showWaiting('🥾 Moving ' + ft + ' ft...');
    drawPlayerMap(d);
  });
}

// ── Copy link ────────────────────────────────────────────────
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copy-link-btn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = '📋 Copy Link'; }, 2000); }
  });
}
window._pvCopyLink = copyLink;

// ── Change character ─────────────────────────────────────────
function changeCharacter() {
  selectedPcId = null;
  sessionStorage.removeItem('pv_selected_pc');
  if (latestData) renderRoot(latestData);
}
window._pvChangeChar = changeCharacter;

// ── Select a character ───────────────────────────────────────
function selectCharacter(id) {
  selectedPcId = String(id);
  sessionStorage.setItem('pv_selected_pc', selectedPcId);
  if (latestData) renderRoot(latestData);
}
window._pvSelectChar = selectCharacter;

// ── Tab switching ────────────────────────────────────────────
function switchPvTab(tab) {
  activeTab = tab;
  if (latestData) renderRoot(latestData);
}
window._pvSwitchTab = switchPvTab;

// ══════════════════════════════════════════════════════════════
// RENDER: Root dispatcher
// ══════════════════════════════════════════════════════════════
function renderRoot(d) {
  latestData = d;
  const root = document.getElementById('pv-root');
  const party = d.party || [];

  if (!party.length) {
    root.innerHTML = '<div style="text-align:center;color:#555;padding:60px 0;font-style:italic;">No party members yet. Ask your DM to add characters.</div>';
    return;
  }

  // Check if selected PC still exists
  if (selectedPcId) {
    const found = party.find(pc => String(pc.id) === selectedPcId);
    if (!found) {
      selectedPcId = null;
      sessionStorage.removeItem('pv_selected_pc');
    }
  }

  // If we just created a character, auto-select it as soon as the DM's app adds it
  const pendingAdd = sessionStorage.getItem('pv_pending_add');
  if (!selectedPcId && pendingAdd) {
    const mine = party.find(p => p.name.toLowerCase() === pendingAdd);
    if (mine) {
      sessionStorage.removeItem('pv_pending_add');
      closeOverlay();
      selectedPcId = String(mine.id);
      sessionStorage.setItem('pv_selected_pc', selectedPcId);
    }
  }

  if (!selectedPcId) {
    root.innerHTML = renderSelectionScreen(party);
  } else {
    root.innerHTML = renderTwoColumnView(d);
    if (activeTab === 'map') { drawPlayerMap(d); bindMapInteraction(); }
  }
}

// RENDER: Character Selection Screen
// ══════════════════════════════════════════════════════════════
function renderSelectionScreen(party) {
  const classIcons = {

    Rogue:'\uD83D\uDDE1', Sorcerer:'\uD83D\uDD25', Warlock:'\uD83D\uDC7F', Wizard:'\uD83E\uDE84'
  };

  return '<div class="select-screen">' +
    '<div class="select-title">Who Are You?</div>' +
    '<div class="select-subtitle">Select your character to view your sheet</div>' +
    '<div class="select-grid">' +
    party.map(pc => {
      const icon = classIcons[pc.cls] || '\u2694';
      return '<div class="select-card" onclick="_pvSelectChar(' + pc.id + ')">' +
        '<div class="select-avatar" style="background:' + avatarColor(pc.name) + ';">' + initials(pc.name) + '</div>' +
        '<div class="select-card-name">' + esc(pc.name) + '</div>' +
        '<div class="select-card-info">' + icon + ' ' + esc(pc.race || '') + ' ' + esc(pc.cls) + ' Lv' + (pc.level || 1) + '</div>' +
        (pc.player ? '<div style="font-size:11px;color:#555;margin-top:4px;">played by ' + esc(pc.player) + '</div>' : '') +
      '</div>';
    }).join('') +
    '</div>' +
    '<div style="margin-top:28px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">' +
      '<button class="btn-pv" style="border-color:var(--gold);color:var(--gold-light);" onclick="_pvOpenAddCharacter()">🧝 Add New Character</button>' +
      '<button class="btn-pv" id="copy-link-btn" onclick="_pvCopyLink()">📋 Copy Link</button>' +
    '</div>' +
  '</div>';
}

// ── Player self-registration ─────────────────────────────────
function openAddCharacter() {
  const inp = (id, label, ph, type, val) =>
    '<div style="display:flex;flex-direction:column;gap:2px;">' +
      '<label style="font-size:10px;font-family:Cinzel,serif;letter-spacing:0.08em;color:var(--text-dim);">' + label + '</label>' +
      '<input id="' + id + '" type="' + (type || 'text') + '" placeholder="' + ph + '" value="' + (val || '') + '" style="font-size:14px;padding:7px;background:rgba(0,0,0,0.35);border:1px solid rgba(212,175,55,0.25);border-radius:5px;color:var(--parchment);">' +
    '</div>';
  const classes = ['Barbarian','Bard','Cleric','Druid','Fighter','Monk','Paladin','Ranger','Rogue','Sorcerer','Warlock','Wizard','Other'];
  showOverlay(
    '<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);margin-bottom:4px;">🧝 Create Your Character</div>' +
    '<div style="font-size:12px;color:var(--text-dim);margin-bottom:14px;">This sends your character to the DM\'s campaign. Your DM can fill in skills and actions later.</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">' +
      inp('ac-name', 'Character Name*', 'Aldric') +
      inp('ac-player', 'Your Name', 'John') +
      '<div style="display:flex;flex-direction:column;gap:2px;">' +
        '<label style="font-size:10px;font-family:Cinzel,serif;letter-spacing:0.08em;color:var(--text-dim);">Class</label>' +
        '<select id="ac-class" style="font-size:14px;padding:7px;background:rgba(0,0,0,0.35);border:1px solid rgba(212,175,55,0.25);border-radius:5px;color:var(--parchment);">' +
          classes.map(c => '<option>' + c + '</option>').join('') + '</select>' +
      '</div>' +
      inp('ac-race', 'Race', 'Human') +
      inp('ac-level', 'Level', '1', 'number', '1') +
      inp('ac-maxhp', 'Max HP*', '10', 'number') +
      inp('ac-ac', 'Armor Class*', '14', 'number') +
      inp('ac-speed', 'Speed (ft)', '30', 'number', '30') +
    '</div>' +
    '<div style="font-size:10px;font-family:Cinzel,serif;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:4px;">ABILITY SCORES</div>' +
    '<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px;">' +
      ['str','dex','con','int','wis','cha'].map(s =>
        '<div style="text-align:center;"><div style="font-size:9px;color:var(--text-dim);">' + s.toUpperCase() + '</div>' +
        '<input id="ac-' + s + '" type="number" value="10" style="width:100%;text-align:center;font-size:13px;padding:5px 2px;background:rgba(0,0,0,0.35);border:1px solid rgba(212,175,55,0.25);border-radius:4px;color:var(--parchment);"></div>'
      ).join('') +
    '</div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button class="btn-pv" style="flex:1;justify-content:center;border-color:var(--gold);" id="ac-submit">🧝 Join the Party</button>' +
      '<button class="btn-pv" style="justify-content:center;" onclick="_pvCloseOverlay()">Cancel</button>' +
    '</div>'
  );
  document.getElementById('ac-submit').addEventListener('click', async () => {
    const g = id => document.getElementById(id).value;
    const name = g('ac-name').trim();
    if (!name) { document.getElementById('ac-name').style.borderColor = '#e05050'; return; }
    const character = {
      name, player: g('ac-player').trim(), cls: g('ac-class'), race: g('ac-race').trim(),
      level: parseInt(g('ac-level')) || 1, maxhp: parseInt(g('ac-maxhp')) || 10,
      ac: parseInt(g('ac-ac')) || 10, speed: parseInt(g('ac-speed')) || 30,
      str: parseInt(g('ac-str')) || 10, dex: parseInt(g('ac-dex')) || 10, con: parseInt(g('ac-con')) || 10,
      int: parseInt(g('ac-int')) || 10, wis: parseInt(g('ac-wis')) || 10, cha: parseInt(g('ac-cha')) || 10
    };
    const ok = await sendPlayerRequest({ type: 'addCharacter', character, ts: Date.now() });
    if (ok) {
      sessionStorage.setItem('pv_pending_add', name.toLowerCase());
      showWaiting('🧝 Sending ' + name + ' to your DM...');
    }
  });
}
window._pvOpenAddCharacter = openAddCharacter;

// ══════════════════════════════════════════════════════════════
// RENDER: Two-Column Layout (main + sidebar)
// ══════════════════════════════════════════════════════════════
function renderTwoColumnView(d) {
  const party = d.party || [];
  const combatants = d.combatants || [];
  const hasCombat = combatants.length > 0;

  let html = '<div class="pv-layout">';

  // ── LEFT: Main panel ──
  html += '<div class="pv-main">';

  // Toolbar
  html += '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
    '<button class="btn-pv" onclick="_pvChangeChar()">\u2190 Change Character</button>' +
    '<button class="btn-pv" id="copy-link-btn" onclick="_pvCopyLink()">📋 Copy Link</button>' +
  '</div>';

  // Messages
  const msgs = d.pvMessages || {};
  const partyMsg = d.pvPartyMessage || '';
  const pc = party.find(p => String(p.id) === selectedPcId);
  if (pc) {
    const personalMsg = msgs[pc.id] || msgs[String(pc.id)] || '';
    if (partyMsg) html += '<div class="msg-banner party-msg">📢 <strong>DM to Party:</strong> ' + esc(partyMsg) + '</div>';
    if (personalMsg) html += '<div class="msg-banner personal-msg">📨 <strong>DM to You:</strong> ' + esc(personalMsg) + '</div>';
  }

  // YOUR TURN banner + End Turn
  if (isMyTurn(d)) {
    html += '<div class="your-turn-banner">⚔ YOUR TURN — move on the Map tab or use an action below' +
      '<div style="margin-top:8px;"><button class="btn-pv" style="font-size:12px;border-color:var(--gold);" onclick="_pvEndTurn()">⏭ End My Turn</button></div>' +
    '</div>';
  }

  // Tab toggle \u2014 Initiative shows when combat exists, Map shows when the DM has a map
  const hasMap = !!(d.mapState && d.mapState.cols);
  if (hasCombat || hasMap) {
    html += '<div class="pv-tabs">' +
      '<button class="pv-tab' + (activeTab === 'character' ? ' active' : '') + '" onclick="_pvSwitchTab(\'character\')">My Character</button>' +
      (hasCombat ? '<button class="pv-tab' + (activeTab === 'initiative' ? ' active' : '') + '" onclick="_pvSwitchTab(\'initiative\')">\u2694 Initiative</button>' : '') +
      (hasMap ? '<button class="pv-tab' + (activeTab === 'map' ? ' active' : '') + '" onclick="_pvSwitchTab(\'map\')">\ud83d\uddfa Map</button>' : '') +
    '</div>';
  }

  // Tab content
  if (activeTab === 'initiative' && hasCombat) {
    html += renderInitiativePanel(d);
  } else if (activeTab === 'map' && hasMap) {
    html += renderMapPanel(d);
  } else {
    html += renderCharacterCard(d);
  }

  html += '</div>'; // close pv-main

  // ── RIGHT: Party sidebar ──
  html += '<div class="pv-sidebar">';
  html += renderPartySidebar(d);
  html += '</div>';

  html += '</div>'; // close pv-layout
  return html;
}

// ══════════════════════════════════════════════════════════════
// RENDER: Character Card (left panel)
// ══════════════════════════════════════════════════════════════
function renderCharacterCard(d) {
  const party = d.party || [];
  const combatants = d.combatants || [];
  const pc = party.find(p => String(p.id) === selectedPcId);
  if (!pc) return '';

  const cmb = combatants.find(x => x.name === pc.name && x.type === 'ally');
  const curHp = cmb ? cmb.hp : (pc.maxhp || 0);
  const maxHp = cmb ? cmb.maxHp : (pc.maxhp || 0);
  const pct = hpPct(curHp, maxHp);
  const hc = hpColor(pct);
  const conditions = (cmb && cmb.conditions) || [];

  let html = '<div class="card">';

  // Name + basic info
  html += '<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;">' +
    '<div class="select-avatar" style="width:56px;height:56px;font-size:20px;background:' + avatarColor(pc.name) + ';">' + initials(pc.name) + '</div>' +
    '<div style="flex:1;">' +
      '<div style="font-family:Cinzel,serif;font-size:22px;font-weight:700;color:var(--gold);">' + esc(pc.name) + '</div>' +
      '<div style="font-size:14px;color:var(--text-dim);">' + (pc.race ? esc(pc.race) + ' ' : '') + esc(pc.cls) + ' &middot; Level ' + (pc.level || 1) + '</div>' +
      (pc.player ? '<div style="font-size:12px;color:#555;">played by ' + esc(pc.player) + '</div>' : '') +
    '</div>' +
    '<div style="text-align:right;">' +
      '<div style="font-size:28px;font-weight:700;color:' + hc + ';">' + curHp + '<span style="font-size:14px;color:#555;">/' + maxHp + '</span></div>' +
      '<div style="font-size:10px;color:#555;">HP</div>' +
    '</div>' +
  '</div>';

  // HP bar
  html += '<div class="hp-bar-wrap"><div class="hp-bar" style="width:' + pct + '%;background:' + hc + ';"></div></div>';

  // AC + Init + Inspiration
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;">' +
    '<span style="padding:5px 14px;border-radius:5px;font-size:13px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#aaa;">🛡 AC <strong style="color:var(--parchment);">' + (pc.ac || '?') + '</strong></span>' +
    '<span style="padding:5px 14px;border-radius:5px;font-size:13px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#aaa;">\u26A1 Init <strong style="color:var(--parchment);">' + fmtMod(pc.initBonus || 0) + '</strong></span>' +
    (pc.inspiration ? '<span class="insp-badge">\u2605 Inspired</span>' : '') +
  '</div>';

  // Conditions
  if (conditions.length) {
    html += '<div style="margin:8px 0;">' + conditions.map(c => '<span class="cond-tag">' + esc(c) + '</span>').join('') + '</div>';
  }

  // Combat actions (playable on your turn)
  const pcActions = pc.actions || [];
  if (pcActions.length) {
    const myTurn = isMyTurn(d);
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Actions' +
      (myTurn ? ' <span style="color:var(--gold-light);font-size:9px;text-transform:none;letter-spacing:0;">— it\'s your turn!</span>'
              : ' <span style="font-size:9px;color:#555;text-transform:none;letter-spacing:0;">(usable on your turn during combat)</span>') + '</div>';
    pcActions.forEach((a, i) => {
      html += '<div class="pv-action-row">' +
        '<span style="font-size:16px;">' + (a.kind === 'heal' ? '❤' : '⚔') + '</span>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:14px;font-weight:600;color:var(--parchment);">' + esc(a.name) + '</div>' +
          '<div style="font-size:11px;color:var(--text-dim);">' + (a.range || 5) + ' ft · ' + esc(a.dice || '') + (a.kind !== 'heal' ? ' · +' + (a.bonus || 0) + ' to hit' : '') + '</div>' +
        '</div>' +
        '<button class="pv-action-use" ' + (myTurn ? '' : 'disabled') + ' onclick="_pvUseAction(' + i + ')">USE</button>' +
      '</div>';
    });
    html += '</div>';
  }

  // Ability scores
  html += '<div class="ability-grid">';
  ['STR','DEX','CON','INT','WIS','CHA'].forEach((label, i) => {
    const keys = ['str','dex','con','int','wis','cha'];
    const val = pc[keys[i]] || 10;
    const m = mod(val);
    html += '<div class="ability-box">' +
      '<div class="ability-mod">' + fmtMod(m) + '</div>' +
      '<div class="ability-score">' + val + '</div>' +
      '<div class="ability-label">' + label + '</div>' +
    '</div>';
  });
  html += '</div>';

  // Skills
  const skills = pc.skills || {};
  const hasSkills = SKILL_LIST.some(sk => (skills[sk.key] || 0) > 0);
  if (hasSkills) {
    const pb = profBonus(pc.level || 1);
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Skills <span style="font-size:9px;color:#555;text-transform:none;letter-spacing:0;">(Prof +' + pb + ')</span></div>';
    html += '<div class="skills-grid">';
    SKILL_LIST.forEach(sk => {
      const val = skills[sk.key] || 0;
      const abilityMod = mod(pc[sk.ability] || 10);
      let bonus = abilityMod;
      if (val === 1) bonus += pb;
      if (val === 2) bonus += pb * 2;
      const icon = val === 0 ? '<span style="color:#444;">\u25CB</span>' : val === 1 ? '<span style="color:#90c8ff;">\u25CF</span>' : '<span style="color:#ffe066;">\u2733</span>';
      const nameColor = val > 0 ? '#d4b880' : '#666';
      const bonusColor = val === 2 ? '#ffe066' : val === 1 ? '#90c8ff' : '#666';
      html += '<div class="skill-row">' +
        '<span class="skill-icon">' + icon + '</span>' +
        '<span class="skill-name" style="color:' + nameColor + ';">' + sk.label + '</span>' +
        '<span class="skill-bonus" style="color:' + bonusColor + ';">' + fmtMod(bonus) + '</span>' +
      '</div>';
    });
    html += '</div></div>';
  }

  // Spell slots
  const spellSlots = pc.spellSlots || [];
  if (spellSlots.length) {
    const lvlNames = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Spell Slots</div>';
    spellSlots.forEach((slot, i) => {
      const available = slot.max - slot.used;
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">' +
        '<span style="font-size:11px;color:var(--text-dim);width:28px;flex-shrink:0;">' + lvlNames[i] + '</span>';
      for (let j = 0; j < slot.max; j++) {
        const spent = j >= available;
        html += '<span class="pip" style="background:' + (spent ? 'rgba(255,255,255,0.07)' : 'rgba(100,180,255,0.65)') + ';border:1px solid ' + (spent ? 'rgba(255,255,255,0.12)' : 'rgba(100,180,255,0.9)') + ';' + (spent ? '' : 'box-shadow:0 0 4px rgba(100,180,255,0.3);') + '"></span>';
      }
      html += '<span style="font-size:11px;color:' + (available > 0 ? '#90c8ff' : '#555') + ';margin-left:4px;">' + available + '/' + slot.max + '</span></div>';
    });
    html += '</div>';
  }

  // Abilities / Moves
  const moves = (pc.moves || '').split('\n').filter(Boolean);
  if (moves.length) {
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Abilities &amp; Features</div>';
    moves.forEach(m => {
      const parts = m.split('\u2014');
      const name = parts[0];
      const rest = parts.slice(1).join('\u2014');
      html += '<div style="padding:4px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04);">' +
        '<strong style="color:var(--gold-light);">' + esc(name.trim()) + '</strong>' +
        (rest ? ' <span style="color:var(--text-dim);">\u2014 ' + esc(rest.trim()) + '</span>' : '') +
      '</div>';
    });
    html += '</div>';
  }

  // Party Inventory
  const inv = d.partyInventory || [];
  if (inv.length) {
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<div class="card-section-label" style="border:none;padding:0;margin-bottom:8px;">Party Inventory</div>';
    inv.forEach(item => {
      html += '<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);">' +
        '<span style="font-size:18px;">' + (item.icon || '?') + '</span>' +
        '<div>' +
          '<div style="font-size:14px;color:#d4b880;">' + esc(item.name) + '</div>' +
          (item.desc ? '<div style="font-size:12px;color:#555;">' + esc(item.desc) + '</div>' : '') +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  }

  html += '</div>'; // close card
  return html;
}

// ══════════════════════════════════════════════════════════════
// RENDER: Initiative Panel (left panel, when tab active)
// ══════════════════════════════════════════════════════════════
function renderInitiativePanel(d) {
  const combatants = d.combatants || [];
  if (!combatants.length) return '';

  let html = '<div class="card">';

  // Combat status banner
  if (d.combatActive) {
    html += '<div class="combat-banner combat-active">\u2694 COMBAT \u2014 Round ' + (d.currentRound || 1) + '</div>';
  } else {
    html += '<div class="combat-banner combat-inactive">Initiative Set \u2014 Combat Not Started</div>';
  }

  // Initiative rows
  combatants.forEach((c, i) => {
    if (c.hidden) return; // DM marked this combatant hidden from players
    const isAlly = c.type === 'ally';
    const cHpPct = hpPct(c.hp, c.maxHp);
    const cHc = hpColor(cHpPct);
    const isCurrent = d.combatActive && i === (d.currentTurn >= 0 ? d.currentTurn : 0);
    const conds = c.conditions || [];

    html += '<div class="init-row' + (isCurrent ? ' init-current' : '') + '">';

    // Initiative number
    html += '<span style="font-size:18px;font-weight:700;color:var(--gold);width:30px;text-align:center;flex-shrink:0;">' + (c.initiative || c.init || '?') + '</span>';

    // Name + conditions
    html += '<div style="flex:1;min-width:0;">' +
      '<div style="font-size:15px;font-weight:600;color:' + (isAlly ? '#90c8ff' : '#ff9090') + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
        esc(c.name) + (isCurrent ? ' \u25C0' : '') +
      '</div>';
    if (conds.length) {
      html += '<div style="margin-top:3px;">' + conds.map(cn => '<span class="cond-tag" style="font-size:10px;padding:1px 6px;">' + esc(cn) + '</span>').join('') + '</div>';
    }
    html += '</div>';

    // HP bar + numbers
    html += '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">' +
      '<div style="width:60px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;"><div style="height:100%;width:' + cHpPct + '%;background:' + cHc + ';border-radius:3px;"></div></div>' +
      '<span style="font-size:13px;font-weight:600;color:' + cHc + ';min-width:50px;text-align:right;">' + c.hp + '/' + c.maxHp + '</span>' +
    '</div>';

    html += '</div>'; // close init-row
  });

  html += '</div>'; // close card
  return html;
}

// RENDER: Battle Map Panel (left panel, when tab active)
// ══════════════════════════════════════════════════════════════
function renderMapPanel(d) {
  const myTurn = isMyTurn(d);
  return '<div class="card">' +
    '<div class="card-section-label">Battle Map <span style="font-size:9px;color:#555;text-transform:none;letter-spacing:0;">(live from your DM — each square is 5 ft)</span></div>' +
    (myTurn ? '<div style="font-size:13px;color:var(--gold-light);margin-bottom:8px;">⚔ Your turn: tap an <strong style=\"color:#ff9090;\">enemy</strong> to attack, or tap your token then a square to move (up to ' + pvSpeedFt(myCombatant(d) || {}, (myPC(d) || {}).speed || 30) + ' ft).</div>' : '') +
    '<div style="border:1px solid rgba(212,175,55,0.25);border-radius:8px;background:#0a0603;">' +
      '<canvas id="pv-map-canvas" style="display:block;width:100%;height:auto;"></canvas>' +

  '</div>';
}

const PV_GROUNDS = {
  stone:  { base: [74, 70, 66],   jitter: 10 },
  grass:  { base: [58, 92, 48],   jitter: 14 },
  wood:   { base: [96, 66, 40],   jitter: 8 },
  cave:   { base: [38, 34, 32],   jitter: 8 },
  sand:   { base: [148, 126, 84], jitter: 12 },
  water:  { base: [40, 70, 100],  jitter: 10 },
  snow:   { base: [168, 172, 180],jitter: 8 }
};

function pvCellHash(x, y, seed) {
  let h = (x * 73856093) ^ (y * 19349663) ^ (seed * 83492791);
  h = h ^ (h >> 13); h = (h * 1274126177) & 0x7fffffff;
  return (h % 1000) / 1000;
}

function drawPlayerMap(d) {
  const m = d.mapState;
  const canvas = document.getElementById('pv-map-canvas');
  if (!m || !canvas) return;
  canvas.width = m.cols * m.cell;
  canvas.height = m.rows * m.cell;
  const ctx = canvas.getContext('2d');

  // Ground
  const g = PV_GROUNDS[m.ground] || PV_GROUNDS.stone;
  for (let y = 0; y < m.rows; y++) {
    for (let x = 0; x < m.cols; x++) {
      const v = pvCellHash(x, y, m.seed);
      const dv = Math.floor((v - 0.5) * 2 * g.jitter);
      ctx.fillStyle = 'rgb(' + (g.base[0]+dv) + ',' + (g.base[1]+dv) + ',' + (g.base[2]+dv) + ')';
      ctx.fillRect(x * m.cell, y * m.cell, m.cell, m.cell);
      if (v > 0.92) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(x*m.cell + m.cell*v, y*m.cell + m.cell*(1-v), 2, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // Roads
  (m.roads || []).forEach(key => {
    const parts = key.split(',');
    const rx = parseInt(parts[0]), ry = parseInt(parts[1]);
    const v = pvCellHash(rx, ry, m.seed + 31);
    const dv = Math.floor((v - 0.5) * 14);
    ctx.fillStyle = 'rgb(' + (122 + dv) + ',' + (108 + dv) + ',' + (88 + dv) + ')';
    ctx.fillRect(rx * m.cell, ry * m.cell, m.cell, m.cell);
  });

  // Walls
  (m.walls || []).forEach(key => {
    const parts = key.split(',');
    const wx = parseInt(parts[0]), wy = parseInt(parts[1]);
    ctx.fillStyle = '#1c1815';
    ctx.fillRect(wx * m.cell, wy * m.cell, m.cell, m.cell);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(wx * m.cell, wy * m.cell, m.cell, 3);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(wx * m.cell, (wy + 1) * m.cell - 3, m.cell, 3);
  });

  // Buildings with labels
  const PV_BUILDING_STYLES = {
    inn: { roof: '#7a4520', wall: '#5a3818' }, smithy: { roof: '#4e4e52', wall: '#3a3a3e' },
    temple: { roof: '#7a7a9c', wall: '#5c5c78' }, shop: { roof: '#6e5a28', wall: '#544418' },
    house: { roof: '#5e4a32', wall: '#463624' }, guardhouse: { roof: '#46525e', wall: '#343e48' },
    stable: { roof: '#6a5030', wall: '#503c20' }
  };
  (m.buildings || []).forEach(b => {
    const st = PV_BUILDING_STYLES[b.type] || PV_BUILDING_STYLES.house;
    const bx = b.x * m.cell, by = b.y * m.cell, bw = b.w * m.cell, bh = b.h * m.cell;
    ctx.fillStyle = st.wall;
    ctx.fillRect(bx + 2, by + 2, bw - 4, bh - 4);
    ctx.fillStyle = st.roof;
    ctx.fillRect(bx + 5, by + 5, bw - 10, bh - 10);
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(bx + 2, by + 2, bw - 4, bh - 4);
    ctx.fillStyle = 'rgba(20,12,6,0.85)';
    ctx.fillRect(bx + bw / 2 - 4, by + bh - 7, 8, 5);
    if (b.name) {
      ctx.font = 'bold ' + Math.max(11, Math.floor(m.cell * 0.30)) + 'px Cinzel, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 3.5;
      ctx.strokeStyle = 'rgba(0,0,0,0.85)';
      ctx.strokeText(b.name, bx + bw / 2, by + bh / 2);
      ctx.fillStyle = '#f0e0b8';
      ctx.fillText(b.name, bx + bw / 2, by + bh / 2);
    }
  });

  // AoE templates (spell areas the DM dropped)
  (m.props || []).forEach(p => {
    if (p.kind !== 'aoe') return;
    const acx = (p.x + 0.5) * m.cell, acy = (p.y + 0.5) * m.cell;
    ctx.beginPath();
    ctx.arc(acx, acy, p.r * m.cell, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + (p.color || '255,120,30') + ',0.22)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(' + (p.color || '255,120,30') + ',0.75)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(' + (p.color || '255,120,30') + ',0.9)';
    ctx.font = 'bold ' + Math.floor(m.cell * 0.28) + 'px Cinzel, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText((p.r * 5) + 'ft', acx, acy);
  });

  // Props (with parchment base plates so dark icons stay visible)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  (m.props || []).forEach(p => {
    if (p.kind === 'aoe') return;
    const span = p.cells || 1;
    const pcx = (p.x + span / 2) * m.cell;
    const pcy = (p.y + span / 2) * m.cell;
    const br = m.cell * span * 0.44;
    const grad = ctx.createRadialGradient(pcx, pcy, br * 0.2, pcx, pcy, br);
    grad.addColorStop(0, 'rgba(232,218,184,0.34)');
    grad.addColorStop(1, 'rgba(232,218,184,0.06)');
    ctx.beginPath();
    ctx.arc(pcx, pcy, br, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = Math.floor(m.cell * span * (p.size || 0.8)) + 'px serif';
    ctx.fillText(p.icon, pcx, pcy + m.cell * span * 0.05);
  });

  // Tokens — hidden combatants never render for players
  (d.combatants || []).forEach(c => {
    if (c.hidden) return;
    const pos = (m.tokens || {})[c.id];
    if (!pos) return;
    const cx = (pos.x + 0.5) * m.cell, cy = (pos.y + 0.5) * m.cell, r = m.cell * 0.38;
    const dead = c.hp <= 0;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = dead ? '#3a3a3a' : (c.type === 'ally' ? '#2d6a4f' : c.type === 'enemy' ? '#8b1a1a' : '#5a5a7a');
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = dead ? '#666' : (c.type === 'ally' ? '#7ee0a8' : c.type === 'enemy' ? '#ff8080' : '#b0b0d0');
    ctx.stroke();
    if (!dead && c.maxHp > 0) {
      const pct = Math.max(0, Math.min(1, c.hp / c.maxHp));
      ctx.beginPath();
      ctx.arc(cx, cy, r + 3, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2);
      ctx.strokeStyle = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ff9800' : '#f44336';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.floor(m.cell * 0.3) + 'px Cinzel, serif';
    ctx.fillText(dead ? '💀' : initials(c.name), cx, cy);
    ctx.font = Math.floor(m.cell * 0.22) + 'px Cinzel, serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 2.5;
    const label = c.name.length > 10 ? c.name.slice(0, 10) + '…' : c.name;
    ctx.strokeText(label, cx, cy + r + 9);
    ctx.fillText(label, cx, cy + r + 9);
  });

  // Movement mode: highlight reachable squares + ring your token
  if (moveSelecting && isMyTurn(d)) {
    const me = myCombatant(d);
    const myPos = me ? (m.tokens || {})[me.id] : null;
    const pcSpd = pvSpeedFt(me, (myPC(d) || {}).speed || 30);
    if (myPos) {
      for (let yy = 0; yy < m.rows; yy++) {
        for (let xx = 0; xx < m.cols; xx++) {
          if (distFt(myPos, { x: xx, y: yy }) <= pcSpd) {
            ctx.fillStyle = 'rgba(212,175,55,0.12)';
            ctx.fillRect(xx * m.cell, yy * m.cell, m.cell, m.cell);
          }
        }
      }
      ctx.beginPath();
      ctx.arc((myPos.x + 0.5) * m.cell, (myPos.y + 0.5) * m.cell, m.cell * 0.5, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 3;
      ctx.setLineDash([5, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Fog — fully opaque for players
  ctx.fillStyle = '#0d0804';
  (m.fog || []).forEach(key => {
    const parts = key.split(',');
    ctx.fillRect(parseInt(parts[0]) * m.cell, parseInt(parts[1]) * m.cell, m.cell, m.cell);
  });

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= m.cols; x++) {
    ctx.beginPath(); ctx.moveTo(x*m.cell + 0.5, 0); ctx.lineTo(x*m.cell + 0.5, m.rows*m.cell); ctx.stroke();
  }
  for (let y = 0; y <= m.rows; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*m.cell + 0.5); ctx.lineTo(m.cols*m.cell, y*m.cell + 0.5); ctx.stroke();
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER: Party Sidebar (right column)
// ══════════════════════════════════════════════════════════════
function renderPartySidebar(d) {
  const party = d.party || [];
  const combatants = d.combatants || [];

  let html = '<div class="card" style="position:sticky;top:70px;">';
  html += '<div class="card-section-label">The Party</div>';

  party.forEach(pc => {
    const isYou = String(pc.id) === selectedPcId;
    const cmb = combatants.find(x => x.name === pc.name && x.type === 'ally');
    const curHp = cmb ? cmb.hp : (pc.maxhp || 0);
    const maxHp = cmb ? cmb.maxHp : (pc.maxhp || 0);
    const pct = hpPct(curHp, maxHp);
    const hc = hpColor(pct);
    const conds = (cmb && cmb.conditions) || [];

    html += '<div class="sidebar-pc' + (isYou ? ' is-you' : '') + '">';

    // Name row
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
      '<div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;' +
        'font-family:Cinzel,serif;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;' +
        'background:' + avatarColor(pc.name) + ';border:2px solid ' + (isYou ? 'var(--gold)' : 'rgba(255,255,255,0.12)') + ';">' +
        initials(pc.name) +
      '</div>' +
      '<div style="min-width:0;flex:1;">' +
        '<div class="sidebar-pc-name">' + esc(pc.name) + (isYou ? ' <span style="font-size:10px;color:var(--text-dim);">(You)</span>' : '') + '</div>' +
        '<div class="sidebar-pc-sub">' + esc(pc.cls) + ' Lv' + (pc.level || 1) + '</div>' +
      '</div>' +
    '</div>';

    // HP bar
    html += '<div style="display:flex;align-items:center;gap:6px;">' +
      '<div class="sidebar-hp-bar" style="flex:1;"><div class="sidebar-hp-fill" style="width:' + pct + '%;background:' + hc + ';"></div></div>' +
      '<span class="sidebar-hp-text" style="margin:0;min-width:38px;">' + curHp + '/' + maxHp + '</span>' +
    '</div>';

    // Conditions
    if (conds.length) {
      html += '<div class="sidebar-conds">' + conds.map(c => '<span class="sidebar-cond-tag">' + esc(c) + '</span>').join('') + '</div>';
    }

    // Death saves (if HP is 0)
    if (curHp <= 0 && maxHp > 0) {
      const successes = cmb ? (cmb.deathSuccess || 0) : 0;
      const failures = cmb ? (cmb.deathFail || 0) : 0;
      html += '<div class="sidebar-death-saves">' +
        '<span style="color:#8fd050;">';
      for (let s = 0; s < 3; s++) {
        html += s < successes ? '\u25CF ' : '\u25CB ';
      }
      html += '</span>' +
        '<span style="color:#e05050;">';
      for (let f = 0; f < 3; f++) {
        html += f < failures ? '\u25CF ' : '\u25CB ';
      }
      html += '</span>' +
      '</div>';
    }

    html += '</div>'; // close sidebar-pc
  });

  html += '</div>'; // close card
  return html;
}

// ══════════════════════════════════════════════════════════════
// FIREBASE LISTENER
// ══════════════════════════════════════════════════════════════
if (dmUid) {
  const statusEl = document.getElementById('pv-status');
  let firstLoad = true;

  onSnapshot(doc(db, 'playerView', dmUid), snap => {
    if (!snap.exists()) {
      statusEl.textContent = 'Waiting for DM...';
      document.getElementById('pv-root').innerHTML =
        '<div style="text-align:center;color:#555;padding:60px 0;font-style:italic;">Waiting for your DM to start the session...</div>';
      return;
    }

    const d = snap.data();
    renderRoot(d);

    // Action result feed → hit/miss/heal animation for everyone watching
    if (d.actionFeed && String(d.actionFeed.id) !== String(lastFeedId)) {
      const fresh = Date.now() - new Date(d.actionFeed.ts || 0).getTime() < 30000;
      lastFeedId = d.actionFeed.id;
      sessionStorage.setItem('pv_last_feed', String(lastFeedId));
      if (fresh) showActionResult(d.actionFeed);
    }

    const now = new Date();
    statusEl.textContent = (firstLoad ? 'Live ' : '') +
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    statusEl.style.color = '#8fd050';
    firstLoad = false;
  }, err => {
    console.error('Snapshot error:', err);
    document.getElementById('pv-status').textContent = 'Connection lost';
    document.getElementById('pv-status').style.color = '#e05050';
  });
}
</script>
