<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player View — DM Grimoire</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a0f0a;
    --parchment: #f0e6cc;
    --gold: #d4a820;
    --gold-light: #f0c030;
    --gold-dim: #9a7a18;
    --blood: #8b1a1a;
    --blood-light: #e05050;
    --text-dim: #a89060;
    --text-secondary: #d4b880;
    --border: #6a4a28;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0d0804;
    color: #d4b880;
    font-family: 'Crimson Text', serif;
    font-size: 19px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,150,10,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,26,26,0.06) 0%, transparent 50%);
  }
  body { padding: 0; overflow-x: hidden; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 3px; }

  /* ===== HEADER ===== */
  .pv-header {
    background: linear-gradient(180deg, rgba(42,26,14,0.98) 0%, rgba(20,12,6,0.98) 100%);
    border-bottom: 2px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .pv-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(14px, 3vw, 20px);
    color: var(--gold);
    text-shadow: 0 0 15px rgba(201,150,10,0.4);
  }
  .pv-status {
    font-size: 11px;
    font-family: 'Cinzel', serif;
    color: #8fd050;
  }

  /* ===== TWO-COLUMN LAYOUT ===== */
  .pv-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
    min-height: calc(100vh - 60px);
  }

  .pv-main {
    min-width: 0;
  }

  .pv-sidebar {
    min-width: 0;
  }

  /* ===== CHARACTER SELECTION ===== */
  .select-screen {
    text-align: center;
    padding: 40px 16px;
    grid-column: 1 / -1;
  }
  .select-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 4vw, 28px);
    color: var(--gold);
    margin-bottom: 8px;
  }
  .select-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 32px;
  }
  .select-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    max-width: 700px;
    margin: 0 auto;
  }
  .select-card {
    background: linear-gradient(135deg, rgba(38,24,10,0.98), rgba(28,16,6,1));
    border: 2px solid rgba(212,175,55,0.2);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }
  .select-card:hover {
    border-color: rgba(212,175,55,0.6);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(212,175,55,0.15);
  }
  .select-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 22px; font-weight: 700;
    color: #fff;
    border: 3px solid rgba(255,255,255,0.15);
  }
  .select-card-name {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .select-card-info {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ===== TAB TOGGLE ===== */
  .pv-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(212,175,55,0.25);
  }
  .pv-tab {
    flex: 1;
    padding: 10px 16px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-align: center;
    cursor: pointer;
    background: rgba(0,0,0,0.3);
    color: var(--text-dim);
    border: none;
    transition: all 0.2s;
  }
  .pv-tab:hover {
    background: rgba(212,175,55,0.08);
    color: var(--gold);
  }
  .pv-tab.active {
    background: rgba(212,175,55,0.15);
    color: var(--gold);
    box-shadow: inset 0 -2px 0 var(--gold);
  }

  /* ===== CARDS ===== */
  .card {
    background: linear-gradient(135deg, rgba(38,24,10,0.98), rgba(28,16,6,1));
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .card-section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(212,175,55,0.15);
  }

  /* ===== HP BAR ===== */
  .hp-bar-wrap {
    background: rgba(0,0,0,0.4);
    border-radius: 5px;
    height: 10px;
    overflow: hidden;
    margin: 8px 0;
  }
  .hp-bar {
    height: 100%;
    border-radius: 5px;
    transition: width 0.6s ease;
  }

  /* ===== ABILITY SCORES ===== */
  .ability-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin: 12px 0;
  }
  .ability-box {
    text-align: center;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 6px;
    padding: 8px 4px;
  }
  .ability-mod {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-light);
  }
  .ability-score {
    font-size: 11px;
    color: var(--text-dim);
  }
  .ability-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ===== SKILLS ===== */
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 12px;
  }
  .skill-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 4px;
    border-radius: 3px;
  }
  .skill-icon { font-size: 12px; width: 16px; text-align: center; flex-shrink: 0; }
  .skill-name { font-size: 12px; flex: 1; }
  .skill-bonus { font-size: 12px; font-family: 'Cinzel', serif; font-weight: 600; min-width: 28px; text-align: right; }

  /* ===== SPELL PIPS ===== */
  .pip {
    display: inline-block;
    width: 16px; height: 16px;
    border-radius: 50%;
    margin: 2px;
    cursor: default;
  }

  /* ===== MESSAGES ===== */
  .msg-banner {
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
    font-size: 15px;
    line-height: 1.5;
  }
  .party-msg {
    background: rgba(212,175,55,0.1);
    border: 1px solid rgba(212,175,55,0.35);
    color: #ffe066;
  }
  .personal-msg {
    background: rgba(100,180,255,0.08);
    border: 1px solid rgba(100,180,255,0.35);
    color: #b8d8ff;
  }

  /* ===== CONDITIONS ===== */
  .cond-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(255,100,100,0.12);
    border: 1px solid rgba(255,100,100,0.3);
    color: #ff9090;
    margin: 2px 2px 2px 0;
  }

  /* ===== SIDEBAR PARTY CARDS ===== */
  .sidebar-pc {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .sidebar-pc.is-you {
    border-color: rgba(212,175,55,0.4);
    background: rgba(212,175,55,0.06);
  }
  .sidebar-pc-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-pc-sub {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .sidebar-hp-bar {
    background: rgba(0,0,0,0.4);
    border-radius: 3px;
    height: 6px;
    overflow: hidden;
  }
  .sidebar-hp-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .sidebar-hp-text {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    text-align: right;
  }
  .sidebar-conds {
    margin-top: 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .sidebar-cond-tag {
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    background: rgba(255,100,100,0.12);
    border: 1px solid rgba(255,100,100,0.3);
    color: #ff9090;
  }
  .sidebar-death-saves {
    margin-top: 5px;
    font-size: 10px;
    display: flex;
    gap: 8px;
  }

  /* ===== INITIATIVE ROWS (in main panel) ===== */
  .init-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
  }
  .init-current {
    background: rgba(212,175,55,0.12);
    border: 1px solid rgba(212,175,55,0.35);
  }
  .init-row:not(.init-current) {
    background: rgba(0,0,0,0.2);
  }

  /* ===== BUTTONS ===== */
  .btn-pv {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid rgba(212,175,55,0.3);
    background: rgba(212,175,55,0.1);
    color: var(--gold);
    transition: all 0.2s;
  }
  .btn-pv:hover {
    background: rgba(212,175,55,0.2);
    border-color: rgba(212,175,55,0.5);
  }

  /* ===== INSPIRATION ===== */
  .insp-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.45);
    color: #ffd700;
  }

  /* ===== COMBAT BANNER ===== */
  .combat-banner {
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 12px;
  }
  .combat-active {
    background: rgba(224,80,80,0.12);
    border: 1px solid rgba(224,80,80,0.35);
    color: #ff9090;
  }
  .combat-inactive {
    background: rgba(80,180,80,0.08);
    border: 1px solid rgba(80,180,80,0.2);
    color: #8fd050;
  }

  /* ===== YOUR TURN + PLAYABLE ACTIONS ===== */
  .your-turn-banner {
    background: linear-gradient(90deg, rgba(212,175,55,0.25), rgba(212,175,55,0.08), rgba(212,175,55,0.25));
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 12px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.12em;
    animation: turnPulse 1.6s ease-in-out infinite;
  }
  @keyframes turnPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(212,175,55,0.25); }
    50% { box-shadow: 0 0 22px rgba(212,175,55,0.55); }
  }
  /* Table-mode death-save drama */
  .death-drama {
    border: 2px solid rgba(224,60,60,0.55);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(60,10,10,0.55), rgba(30,6,6,0.35));
    padding: 16px;
    margin-bottom: 14px;
    text-align: center;
    animation: deathPulse 1.4s ease-in-out infinite;
  }
  @keyframes deathPulse {
    0%, 100% { box-shadow: 0 0 10px rgba(224,50,50,0.25); }
    50% { box-shadow: 0 0 34px rgba(224,50,50,0.6); }
  }
  .death-drama-portrait {
    width: 92px; height: 92px; border-radius: 50%; object-fit: cover;
    border: 3px solid rgba(224,70,70,0.8);
    animation: deathPortrait 1.4s ease-in-out infinite;
  }
  @keyframes deathPortrait {
    0%, 100% { filter: grayscale(0.4) brightness(0.9); }
    50% { filter: grayscale(0.7) brightness(0.6); }
  }
  .ds-pip {
    display: inline-block; width: 22px; height: 22px; line-height: 22px;
    font-size: 20px; text-align: center;
  }
  @keyframes dsPop { 0% { transform: scale(0.2); } 70% { transform: scale(1.35); } 100% { transform: scale(1); } }
  .ds-pip.filled { animation: dsPop 0.4s ease-out; }
  .pv-action-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 5px;
  }
  .pv-action-use {
    padding: 5px 14px;
    border-radius: 5px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--gold);
    background: rgba(212,175,55,0.18);
    color: var(--gold-light);
  }
  .pv-action-use:disabled {
    border-color: rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: #555;
    cursor: not-allowed;
  }
  .pv-overlay {
    position: fixed; inset: 0; z-index: 9000;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .pv-overlay-card {
    background: linear-gradient(135deg, rgba(38,24,10,0.99), rgba(28,16,6,1));
    border: 2px solid rgba(212,175,55,0.4);
    border-radius: 12px;
    padding: 22px;
    max-width: 380px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .pv-target-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.3);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    text-align: left;
  }
  .pv-target-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(212,175,55,0.08); }
  .pv-target-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  /* Roll result animation */
  .pv-result-overlay {
    position: fixed; inset: 0; z-index: 9500;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .pv-result-card {
    background: rgba(15,9,4,0.96);
    border-radius: 14px;
    padding: 26px 34px;
    text-align: center;
    animation: pvPop 0.35s cubic-bezier(0.2, 1.4, 0.4, 1);
  }
  .pv-result-card.hit { border: 3px solid #4caf50; box-shadow: 0 0 40px rgba(76,175,80,0.5); }
  .pv-result-card.miss { border: 3px solid #e05050; box-shadow: 0 0 40px rgba(224,80,80,0.5); }
  .pv-result-card.heal { border: 3px solid #64b4ff; box-shadow: 0 0 40px rgba(100,180,255,0.5); }
  @keyframes pvPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pv-roll-num {
    font-family: 'Cinzel', serif; font-size: 44px; font-weight: 700; color: var(--parchment);
    display: inline-block; animation: pvPop 0.3s ease-out;
  }
  .pv-roll-bonus {
    font-family: 'Cinzel', serif; font-size: 26px; color: var(--gold);
    display: inline-block; opacity: 0; animation: pvSlideIn 0.4s ease-out 0.5s forwards;
  }
  .pv-roll-total {
    font-family: 'Cinzel', serif; font-size: 34px; font-weight: 700;
    display: inline-block; opacity: 0; animation: pvSlideIn 0.4s ease-out 1.0s forwards;
  }
  @keyframes pvSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .pv-verdict {
    font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; letter-spacing: 0.15em;
    margin-top: 10px; opacity: 0; animation: pvSlideIn 0.4s ease-out 1.5s forwards;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 720px) {
    .pv-layout {
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 10px;
    }
    .pv-sidebar {
      order: -1;
    }
    .sidebar-pc {
      display: inline-block;
      width: calc(50% - 4px);
      vertical-align: top;
    }
    .ability-grid { gap: 4px; }
    .ability-mod { font-size: 15px; }
    .ability-box { padding: 6px 2px; }
    .skills-grid { grid-template-columns: 1fr; }
    .select-grid { grid-template-columns: 1fr; }
    .card { padding: 14px; }
  }
</style>
</head>
<body>

<div class="pv-header">
  <div class="pv-title">DM Grimoire</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button id="pv-mute-btn" onclick="_pvToggleMute()" style="background:none;border:1px solid rgba(212,175,55,0.3);border-radius:5px;color:var(--gold);font-size:14px;padding:3px 8px;cursor:pointer;">🔊</button>
    <span class="pv-status" id="pv-status">Connecting...</span>
  </div>
</div>

<div id="pv-root">
  <div style="text-align:center;color:#555;padding:60px 0;font-style:italic;">Connecting to your DM...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAHeoD6eKkxm7ezwvBcEt5W6S7nVqZYknY",
  authDomain: "dm-grimoire-20df0.firebaseapp.com",
  projectId: "dm-grimoire-20df0"
});
const db = getFirestore(app);

// ── Get DM UID from URL ──────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const dmUid = params.get('dm');
const tableMode = params.get('table') === '1'; // shared screen at the table — follows the current turn
if (!dmUid) {
  document.getElementById('pv-root').innerHTML =
    '<div style="text-align:center;padding:60px 20px;">' +
    '<div style="font-size:48px;margin-bottom:16px;">📖</div>' +
    '<div style="font-family:Cinzel,serif;font-size:22px;color:var(--gold);margin-bottom:8px;">No DM Link Found</div>' +
    '<div style="color:var(--text-dim);font-size:14px;">Ask your DM for the Player View link.</div></div>';
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const AVATAR_COLORS = ['#7b3a14','#1e4d7a','#3a6b47','#6b2d5e','#7a5c10','#1d5e6b','#6b3a1e','#2d4e7a'];
function avatarHTML(pc, sizePx, fontPx) {
  if (pc.portrait) {
    return '<img src="' + pc.portrait + '" style="width:' + sizePx + 'px;height:' + sizePx + 'px;border-radius:50%;object-fit:cover;border:3px solid rgba(212,175,55,0.45);flex-shrink:0;">';
  }
  return '<div class="select-avatar" style="width:' + sizePx + 'px;height:' + sizePx + 'px;font-size:' + fontPx + 'px;background:' + avatarColor(pc.name) + ';">' + initials(pc.name) + '</div>';
}

function avatarColor(name) {
  let h = 0;
  for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

function initials(name) {
  return String(name).split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function mod(score) { return Math.floor((score - 10) / 2); }
function fmtMod(n) { return n >= 0 ? '+' + n : '' + n; }

function profBonus(level) {
  if (level <= 4) return 2;
  if (level <= 8) return 3;
  if (level <= 12) return 4;

function distFt(a, b) {

function pvMaxActions(c) {

}

const PV_FEATURES = { 'Rage': 'Raging', 'Reckless Attack': 'Reckless', 'Dodge': 'Dodging', 'Disengage': 'Disengaged', 'Hide': 'Hidden' };

function pvCanAct(c) {
  for (const cn of (c.conditions || [])) {
    const eff = PV_CONDITION_EFFECTS[cn];
    if (eff && eff.cantAct) return { ok: false, reason: cn };
  }
  if (c.hp <= 0) return { ok: false, reason: 'at 0 HP' };
  return { ok: true };
}

function pvSpeedFt(c, baseFt) {
  let speed = parseInt(baseFt, 10);
  if (!speed || speed <= 0) speed = 30; // stale/string speeds from old saves default to 30

  for (const cn of (c.conditions || [])) {
    const eff = PV_CONDITION_EFFECTS[cn];
    if (!eff) continue;
    if (eff.speedZero) return 0;
    if (eff.speedFactor) speed = speed * eff.speedFactor;
    if (eff.halfSpeed) speed = Math.floor(speed / 2);
  }
  // Exhaustion: L2 halves speed, L5 drops it to 0
  const ex = Math.max(0, Math.min(6, c.exhaustion || 0));
  if (ex >= 5) return 0;
  if (ex >= 2) speed = Math.floor(speed / 2);
  return speed;
}

// Advantage/disadvantage preview so the player knows HOW to roll
function pvAttackContext(attacker, target, action) {
  const isMelee = (parseInt(action.range) || 5) <= 5;
  let adv = false, dis = false;
  const notes = [];
  (attacker.conditions || []).forEach(cn => {
    const eff = PV_CONDITION_EFFECTS[cn]; if (!eff) return;
    if (eff.selfDis) { dis = true; notes.push('you are ' + cn.toLowerCase()); }
    if (eff.selfAdv) { adv = true; notes.push('you are ' + cn.toLowerCase()); }
  });
  (target.conditions || []).forEach(cn => {
    const eff = PV_CONDITION_EFFECTS[cn]; if (!eff) return;
    if (eff.attackersAdv) { adv = true; notes.push('target is ' + cn.toLowerCase()); }
    if (eff.attackersDis) { dis = true; notes.push('target is ' + cn.toLowerCase()); }
    if (eff.meleeAttackersAdv && isMelee) { adv = true; notes.push('target is ' + cn.toLowerCase() + ' (melee)'); }
    if (eff.rangedAttackersDis && !isMelee) { dis = true; notes.push('target is ' + cn.toLowerCase() + ' (ranged)'); }
  });
  const net = (adv && dis) ? 0 : adv ? 1 : dis ? -1 : 0;
  return { net, notes };
}

// Equipped weapons become attack actions (mirror of the DM engine)
// A +1/+2/+3 magic weapon adds its bonus to BOTH the attack roll and damage.
// Prefer the DM-synced item.magicBonus; fall back to parsing "+N" from the name.
function pvWeaponMagic(it) {
  if (it && typeof it.magicBonus === 'number') return it.magicBonus;
  const m = String((it && it.name) || '').match(/\+\s*([1-9])\b/);
  return m ? parseInt(m[1], 10) : 0;
}
// Combat-wide bonuses from equipped NON-weapon gear (Ring of Protection, etc.).
// Mirrors equipmentMods() on the DM side; keeps the sent action in sync.
function pvEquipMods(pc) {
  const out = { attack: 0, damage: 0, critRange: 20, extraAttack: false };
  (pc.inventory || []).forEach(it => {
    if (!it.equipped) return;
    if (it.slot !== 'weapon') {
      if (it.allAttackBonus) out.attack += it.allAttackBonus;
      if (it.allDamageBonus) out.damage += it.allDamageBonus;
    }
    if (it.critRange && it.critRange < out.critRange) out.critRange = it.critRange;
    if (it.grantsExtraAttack) out.extraAttack = true;
  });
  return out;
}
function pvEffectiveActions(pc) {
  const acts = (pc.actions || []).slice();
  const eq = pvEquipMods(pc);
  (pc.inventory || []).forEach(it => {
    if (!it.equipped || it.slot !== 'weapon' || !it.dice) return;
    if (acts.some(a => a.name.toLowerCase() === it.name.toLowerCase())) return;
    const strMod = mod(pc.str || 10), dexMod = mod(pc.dex || 10);
    const isRanged = (it.range || 5) > 20;
    const am = isRanged ? dexMod : Math.max(strMod, dexMod);
    const magic = pvWeaponMagic(it);
    const flat = am + magic + (parseInt(it.damageBonus) || 0) + eq.damage;
    const toHit = am + profBonus(pc.level || 1) + magic + (parseInt(it.toHitBonus) || 0) + eq.attack;
    const critRange = Math.min(it.critRange || 20, eq.critRange || 20);
    const act = {
      name: it.name, kind: 'attack', range: it.range || 5,
      bonus: toHit,
      dice: (it.dice || '1d6') + (flat !== 0 ? (flat > 0 ? '+' : '') + flat : ''),
      damageType: it.damageType || '', fromItem: true
    };
    // Pass on-hit effects through so resolveCombatAction (DM side) applies them.
    if (critRange < 20) act.critRange = critRange;
    if (it.riderDamage && it.riderDamage.length) act.riderDamage = it.riderDamage.slice();
    if (it.vsType) act.vsType = it.vsType;
    const oh = it.onHitSave;
    if (oh && oh.ability && oh.dc && oh.condition) {
      act.applyCondition = oh.condition; act.saveAbility = oh.ability; act.saveDC = oh.dc;
      if (oh.duration) act.saveDuration = oh.duration;
    }
    acts.push(act);
  });
  return acts;
}

function pvEffectiveAC(pc) {
  let ac = pc.ac || 10;
  (pc.inventory || []).forEach(it => { if (it.equipped && it.acBonus) ac += it.acBonus; });
  return ac;
}

    showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">You can\'t act — you are ' + esc(can.reason) + '.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
    return;
  }
  const isSummon = me.name !== pc.name;
  const allActs = isSummon ? (me.actions || []) : pvEffectiveActions(pc);
  const acts = allActs.filter(a => a.kind !== 'heal');
  // Castable offensive spells show here too — a fireball IS an attack option
  const spellIdxs = [];
  if (!isSummon) (pc.spells || []).forEach((s, i) => {
    if (s.kind === 'heal' || s.kind === 'buff') return;
    const lvl = s.level || 0;
    const slotOk = lvl === 0 || (pc.spellSlots || []).some((sl, idx) => idx + 1 >= lvl && sl.max > 0 && sl.used < sl.max);
    if (slotOk) spellIdxs.push(i);
  });
  if (!acts.length && !spellIdxs.length) {
    showOverlay('<div style="text-align:center;font-size:14px;color:var(--text-dim);">No attacks or castable spells on ' + (isSummon ? esc(me.name) : 'your sheet') + ' yet — ask your DM to add some.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
    return;
  }
  const m = d.mapState;
  const myPos = (m.tokens || {})[me.id];
  const tPos = (m.tokens || {})[target.id];
  const ft = (myPos && tPos) ? distFt(myPos, tPos) : null;
  const hpD = pvHpDescriptor(target);
  let html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
    '<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);flex:1;">⚔ Attack ' + esc(target.name) + '</div>' +
    '<button class="btn-pv" style="font-size:11px;padding:3px 10px;" id="pv-info-btn">ℹ Info</button></div>' +
    '<div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;"><span style="color:' + hpD.color + ';">' + hpD.label + '</span>' + (ft !== null ? ' · ' + ft + ' ft away' : '') + '</div>';
  acts.forEach((a) => {
    const idx = allActs.indexOf(a);
    const outOfRange = ft !== null && ft > (a.range || 5);
    html += '<button class="pv-target-btn" ' + (outOfRange ? 'disabled' : '') + ' data-mattack="' + idx + '">' +
      '<span>⚔ ' + esc(a.name) + '</span>' +
      '<span style="margin-left:auto;font-size:12px;color:' + (outOfRange ? '#e05050' : 'var(--text-dim)') + ';">' + (a.range || 5) + ' ft · ' + esc(a.dice || '') + (outOfRange ? ' — too far' : '') + '</span>' +
    '</button>';
  });
  spellIdxs.forEach(i => {
    const s = pc.spells[i];
    const bits = [(s.level || 0) === 0 ? 'Cantrip' : 'L' + s.level, s.aoeFt ? s.aoeFt + ' ft ' + (s.aoeShape || 'blast') : (s.range || 60) + ' ft', esc(s.dice || '')].filter(Boolean);
    html += '<button class="pv-target-btn" data-mspell="' + i + '" style="border-color:rgba(100,180,255,0.3);">' +
      '<span style="color:#90c8ff;">✨ ' + esc(s.name) + '</span>' +
      '<span style="margin-left:auto;font-size:12px;color:var(--text-dim);">' + bits.join(' · ') + '</span>' +
    '</button>';
  });
  html += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" onclick="_pvCloseOverlay()">Cancel</button>';
  showOverlay(html);
  document.querySelectorAll('[data-mspell]').forEach(btn => {
    btn.addEventListener('click', () => {
      closeOverlay();
      castSpell(parseInt(btn.dataset.mspell));
    });
  });
  const infoBtn = document.getElementById('pv-info-btn');
  if (infoBtn) infoBtn.addEventListener('click', () => { closeOverlay(); showMonsterInfo(target); });
  document.querySelectorAll('[data-mattack]').forEach(btn => {
    btn.addEventListener('click', () => {
      const a = allActs[parseInt(btn.dataset.mattack)];
      closeOverlay();
      askForRoll(a, me.id, target.id, pvAttackContext(me, target, a));
    });
  });
}

// ── Spellcasting flow ────────────────────────────────────────
let pendingCast = null; // { spell, slotLevel } while placing an AoE on the map

function castSpell(spellIdx) {
  const d = latestData;
  if (!d || !isMyTurn(d)) return;
  const pc = myPC(d), me = myCombatant(d);
  const s = (pc.spells || [])[spellIdx];
  if (!s) return;
  const can = pvCanAct(me);
  if (!can.ok) {
    showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">You can\'t cast — you are ' + esc(can.reason) + '.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
    return;
  }
  const lvl = s.level || 0;
  if (lvl === 0) { chooseCastTargets(s, 0); return; }
  // Slot picker: any level >= spell level with a free slot
  const options = (pc.spellSlots || []).map((sl, idx) => ({ level: idx + 1, free: sl.max - sl.used, max: sl.max }))
    .filter(o => o.level >= lvl && o.max > 0);
  const usable = options.filter(o => o.free > 0);
  if (!usable.length) {
    showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">No level ' + lvl + '+ slots left.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
    return;
  }
  if (usable.length === 1 && usable[0].level === lvl) { chooseCastTargets(s, lvl); return; }
  let html = '<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);margin-bottom:10px;">✨ ' + esc(s.name) + ' — which slot?</div>';
  options.forEach(o => {
    html += '<button class="pv-target-btn" ' + (o.free <= 0 ? 'disabled' : '') + ' data-slot="' + o.level + '">' +
      '<span>Level ' + o.level + (o.level > lvl ? ' (upcast)' : '') + '</span>' +
      '<span style="margin-left:auto;font-size:12px;color:' + (o.free > 0 ? '#8fd050' : '#555') + ';">' + o.free + '/' + o.max + ' left</span></button>';
  });
  html += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" onclick="_pvCloseOverlay()">Cancel</button>';
  showOverlay(html);
  document.querySelectorAll('[data-slot]').forEach(btn => btn.addEventListener('click', () => {
    const sl = parseInt(btn.dataset.slot);
    closeOverlay();
    chooseCastTargets(s, sl);
  }));
}
window._pvCastSpell = castSpell;

function chooseCastTargets(s, slotLevel) {
  const d = latestData;
  const me = myCombatant(d);
  if (s.aoeFt) {
    // AoE: place the circle on the map
    pendingCast = { spell: s, slotLevel };
    activeTab = 'map';
    renderRoot(d);
    const shapeWord = s.aoeShape === 'cone' ? 'Tap where your ' + s.aoeFt + ' ft cone should POINT' : s.aoeShape === 'line' ? 'Tap where your ' + s.aoeFt + ' ft line should AIM' : 'Tap the map where you want the center of your ' + s.aoeFt + ' ft blast';
    showOverlay('<div style="text-align:center;font-size:15px;color:var(--gold-light);">🎯 ' + shapeWord + ' — ' + esc(s.name) + '.</div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCancelCast()">Cancel</button>');
    setTimeout(closeOverlay, 2200);
    return;
  }
  // Single target
  const candidates = (d.combatants || []).filter(c => {
    if (c.hidden) return false;
    if (s.kind === 'heal') return c.type === 'ally';
    return c.id !== me.id && c.hp > 0;
  });
  const m = d.mapState;
  const myPos = m && m.tokens ? m.tokens[me.id] : null;
  let html = '<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);margin-bottom:10px;">✨ ' + esc(s.name) + ' — target?</div>';
  candidates.forEach(c => {
    const tPos = m && m.tokens ? m.tokens[c.id] : null;
    let far = false, distLabel = '';
    if (myPos && tPos) {
      const ft = distFt(myPos, tPos);
      far = ft > (s.range || 60);
      distLabel = '<span style="margin-left:auto;font-size:12px;color:' + (far ? '#e05050' : '#8fd050') + ';">' + ft + ' ft' + (far ? ' — too far' : '') + '</span>';
    }
    html += '<button class="pv-target-btn" ' + (far ? 'disabled' : '') + ' data-sptarget="' + c.id + '">' +
      '<span style="color:' + (c.type === 'ally' ? '#90c8ff' : '#ff9090') + ';">' + esc(c.name) + '</span>' +
      '<span style="font-size:12px;color:var(--text-dim);">' + c.hp + '/' + c.maxHp + '</span>' + distLabel + '</button>';
  });
  html += '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:8px;" onclick="_pvCloseOverlay()">Cancel</button>';
  showOverlay(html);
  document.querySelectorAll('[data-sptarget]').forEach(btn => btn.addEventListener('click', () => {
    const tid = parseFloat(btn.dataset.sptarget);
    closeOverlay();
    finishCast(s, slotLevel, { targetId: tid });
  }));
}

// Shape geometry mirror (sphere / cone / line — same math as the DM engine)
function pvShapeHits(spell, origin, aim, d) {
  const lenFt = spell.aoeFt || 0;
  const shape = spell.aoeShape || 'sphere';
  return (d.combatants || []).filter(c => {
    if (c.hidden && c.type !== 'ally') return false;
    const pos = (d.mapState.tokens || {})[c.id];
    if (!pos) return false;
    if (shape === 'sphere') return distFt(pos, aim) <= lenFt;
    if (!origin) return false;
    const vx = pos.x - origin.x, vy = pos.y - origin.y;
    const dx = aim.x - origin.x, dy = aim.y - origin.y;
    const dlen = Math.sqrt(dx * dx + dy * dy);
    if (dlen === 0) return false;
    const ux = dx / dlen, uy = dy / dlen;
    const dFt = Math.sqrt(vx * vx + vy * vy) * 5;
    if (dFt === 0) return false;
    if (shape === 'cone') return dFt <= lenFt && ((vx * ux + vy * uy) / (dFt / 5)) >= 0.883;
    const t = (vx * ux + vy * uy) * 5;
    const perp = Math.abs(vx * uy - vy * ux) * 5;
    return t > 0 && t <= lenFt && perp <= 4;
  });
}

let pvCastHover = null; // cell under the finger/cursor while aiming a spell
let pvZoomLevel = 1;    // 1 = fit width, 2 = 200%, 3 = 300%
function pvZoom(dir) {

function drawCastGhost(ctx, m, d) {
  if (!pendingCast || !pvCastHover) return;
  const s = pendingCast.spell;
  const me = activeUnit(d) || myCombatant(d);
  const origin = me ? (m.tokens || {})[me.id] : null;
  const shape = s.aoeShape || 'sphere';
  ctx.save();
  ctx.fillStyle = 'rgba(255,140,40,0.18)';
  ctx.strokeStyle = 'rgba(255,140,40,0.7)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  const rr = (s.aoeFt / 5) * m.cell;
  if (shape === 'sphere' || !origin) {
    const cx = (pvCastHover.x + 0.5) * m.cell, cy = (pvCastHover.y + 0.5) * m.cell;
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else {
    const ox = (origin.x + 0.5) * m.cell, oy = (origin.y + 0.5) * m.cell;
    const ang = Math.atan2(pvCastHover.y - origin.y, pvCastHover.x - origin.x);
    ctx.beginPath();
    if (shape === 'cone') {
      ctx.moveTo(ox, oy); ctx.arc(ox, oy, rr, ang - 0.49, ang + 0.49); ctx.closePath();
    } else {
      const ex = ox + Math.cos(ang) * rr, ey = oy + Math.sin(ang) * rr, w = m.cell * 0.5;
      ctx.moveTo(ox + Math.cos(ang + Math.PI/2) * w, oy + Math.sin(ang + Math.PI/2) * w);
      ctx.lineTo(ex + Math.cos(ang + Math.PI/2) * w, ey + Math.sin(ang + Math.PI/2) * w);
      ctx.lineTo(ex + Math.cos(ang - Math.PI/2) * w, ey + Math.sin(ang - Math.PI/2) * w);
      ctx.lineTo(ox + Math.cos(ang - Math.PI/2) * w, oy + Math.sin(ang - Math.PI/2) * w);
      ctx.closePath();
    }
    ctx.fill(); ctx.stroke();
  }
  // live "who's in it" glow on affected tokens
  const hits = pvShapeHits(s, origin, pvCastHover, d);
  hits.forEach(c => {
    const pos = (m.tokens || {})[c.id];
    if (!pos) return;
    ctx.beginPath();
    ctx.arc((pos.x + 0.5) * m.cell, (pos.y + 0.5) * m.cell, m.cell * 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = c.type === 'ally' ? 'rgba(255,220,80,0.9)' : 'rgba(255,80,80,0.9)';
    ctx.lineWidth = 3;
    ctx.setLineDash([]);
    ctx.stroke();
  });
  ctx.restore();
}

  pvCastHover = null;

  const me = activeUnit(d) || myCombatant(d);

    : '<div style="font-size:13px;color:var(--text-dim);">Nobody. The dungeon floor takes it personally.</div>';

function finishCast(s, slotLevel, targeting) {
  const d = latestData;
  const pc = myPC(d), me = myCombatant(d);
  const send = (roll, damageRoll) => {
    sendPlayerRequest(Object.assign({ type: 'castSpell', combatantId: me.id, pcId: pc.id, spell: s, slotLevel, roll, damageRoll, ts: Date.now() }, targeting));
    showWaiting('✨ Casting ' + s.name + '...');
  };
  const askDamage = (roll) => {
    if (!s.dice) { send(roll, null); return; }
    const extra = Math.max(0, slotLevel - (s.level || 0));
    const diceLabel = s.dice + (extra > 0 && s.upcastDice ? ' + ' + extra + '×' + s.upcastDice : '');
    showOverlay('<div style="font-family:Cinzel,serif;font-size:16px;color:var(--gold);margin-bottom:8px;text-align:center;">🎲 Roll your damage: ' + esc(diceLabel) + '</div>' +
      '<div style="font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:10px;">Enter the total of your dice, or let the app roll.</div>' +
      '<input id="pv-dmg-input" type="number" min="0" placeholder="total" style="width:100%;font-size:24px;text-align:center;padding:8px;background:rgba(0,0,0,0.4);border:2px solid rgba(212,175,55,0.4);border-radius:8px;color:var(--parchment);margin-bottom:10px;">' +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn-pv" style="flex:1;justify-content:center;border-color:var(--gold);" id="pv-dmg-go">💥 Deal it</button>' +
        '<button class="btn-pv" style="justify-content:center;" id="pv-dmg-auto">🎲 Roll for me</button>' +
      '</div>');
    const inp = document.getElementById('pv-dmg-input');
    inp.focus();
    document.getElementById('pv-dmg-go').addEventListener('click', () => {
      const v = parseInt(inp.value);
      if (!v && v !== 0) { inp.style.borderColor = '#e05050'; return; }
      closeOverlay(); send(roll, v);
    });
    document.getElementById('pv-dmg-auto').addEventListener('click', () => { closeOverlay(); send(roll, null); });
  };
  if (s.kind === 'attack') {
    // d20 first, then damage
    showOverlay('<div style="font-family:Cinzel,serif;font-size:17px;color:var(--gold);margin-bottom:10px;text-align:center;">🎲 Spell attack — roll your d20!</div>' +
      '<input id="pv-sroll" type="number" min="1" max="20" placeholder="1–20" style="width:100%;font-size:28px;text-align:center;padding:10px;background:rgba(0,0,0,0.4);border:2px solid rgba(212,175,55,0.4);border-radius:8px;color:var(--parchment);font-family:Cinzel,serif;margin-bottom:12px;">' +
      '<button class="btn-pv" style="width:100%;justify-content:center;" id="pv-sroll-go">✨ Cast!</button>');
    const inp = document.getElementById('pv-sroll');
    inp.focus();
    document.getElementById('pv-sroll-go').addEventListener('click', () => {
      const roll = parseInt(inp.value);
      if (!roll || roll < 1 || roll > 20) { inp.style.borderColor = '#e05050'; return; }
      closeOverlay(); askDamage(roll);
    });
  } else {
    askDamage(null);
  }
}

// Local dice roll for the auto button (e.g. "2d12+4")
function pvRollDiceLocal(expr) {
  const m = String(expr || '1d6').match(/^(\d*)d(\d+)\s*([+-]\s*\d+)?$/i);
  if (!m) return 0;
  const count = Math.min(parseInt(m[1]) || 1, 40), sides = parseInt(m[2]);
  const mod = m[3] ? parseInt(m[3].replace(/\s/g, '')) : 0;
  let t = 0; for (let i = 0; i < count; i++) t += Math.ceil(Math.random() * sides);
  return Math.max(0, t + mod);
}

// Slot-machine roll: numbers flicker fast, then slow and settle (with suspense)
function pvAnimateRoll(el, finalValue, sides, onDone) {
  if (!el) { if (onDone) onDone(); return; }
  sides = sides || 20;
  let ticks = 0; const total = 20;
  const spin = () => {
    ticks++;
    const done = ticks >= total;
    el.textContent = done ? finalValue : Math.ceil(Math.random() * sides);
    const scale = 1 + Math.min(0.5, (ticks / total) * 0.5);
    el.style.transform = 'scale(' + scale + ')';
    el.style.color = done ? (finalValue === sides ? '#8fd050' : finalValue === 1 ? '#ff6060' : 'var(--gold)') : 'var(--gold-light)';
    if (done) {
      el.style.transform = 'scale(1.35)';
      setTimeout(() => { el.style.transform = 'scale(1)'; }, 160);
      if (typeof pvSound === 'function') pvSound(finalValue === sides ? 'crit' : 'hit');
      if (onDone) onDone();
      return;
    }
    setTimeout(spin, Math.min(40 + ticks * ticks * 0.9, 280));
  };
  spin();
}

// ── Tap-to-move on the map (your turn only) ──────────────────
function bindMapInteraction() {
  const canvas = document.getElementById('pv-map-canvas');
  if (!canvas || canvas._bound) return;
  canvas._bound = true;
  canvas.addEventListener('mousemove', e => {
    if (!pendingCast || !latestData || !latestData.mapState) return;
    const m = latestData.mapState;
    const rect = canvas.getBoundingClientRect();
    const hx = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width) / m.cell);
    const hy = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height) / m.cell);
    if (!pvCastHover || pvCastHover.x !== hx || pvCastHover.y !== hy) {
      pvCastHover = { x: hx, y: hy };
      drawPlayerMap(latestData);
    }
  });
  canvas.addEventListener('click', e => {
    const d = latestData;
    if (!d || !d.mapState) return;
    const m0 = d.mapState;
    // Anyone can inspect: tapping an enemy outside your turn shows what you know
    if (!isMyTurn(d)) {
      const rect0 = canvas.getBoundingClientRect();
      const ix = Math.floor((e.clientX - rect0.left) * (canvas.width / rect0.width) / m0.cell);
      const iy = Math.floor((e.clientY - rect0.top) * (canvas.height / rect0.height) / m0.cell);
      const insp = (d.combatants || []).find(c => {
        if (c.hidden || c.type === 'ally') return false;
        const pos = (m0.tokens || {})[c.id];
        return pos && pos.x === ix && pos.y === iy;
      });
      if (insp) showMonsterInfo(insp);
      return;
    }
    const m = d.mapState;
    // Tap any unit you control (your character or a summon) to command it
    {
      const rectS = canvas.getBoundingClientRect();
      const sx = Math.floor((e.clientX - rectS.left) * (canvas.width / rectS.width) / m.cell);
      const sy = Math.floor((e.clientY - rectS.top) * (canvas.height / rectS.height) / m.cell);
      const tappedUnit = myUnits(d).find(u => {
        const pos = (m.tokens || {})[u.id];
        return pos && pos.x === sx && pos.y === sy;
      });
      if (tappedUnit && !moveSelecting && !pendingCast) {
        activeUnitId = tappedUnit.id;
      }
    }
    const me = activeUnit(d);
    if (!me) return;
    const myPos = (m.tokens || {})[me.id];
    if (!myPos) return;
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width) / m.cell);
    const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height) / m.cell);

    const pc = myPC(d);
    const usedFt = (me.turnUsed && me.turnUsed.movedFt) || 0;
    let baseSpd = me.owner ? 30 : (parseInt(pc && pc.speed, 10) || 30);
    if (!me.owner) ((pc && pc.inventory) || []).forEach(it => { if (it.equipped && it.speedBonus) baseSpd += it.speedBonus; });
    const speed = Math.max(0, pvSpeedFt(me, baseSpd) - usedFt);

    // A pending AoE spell placement takes priority over everything
    if (pendingCast) {
      placeAoECast({ x, y });
      return;
    }

    // Tap an enemy token → attack it from the map
    if (!moveSelecting) {
      const tapped = (d.combatants || []).find(c => {
        if (c.hidden || c.id === me.id) return false;
        const pos = (m.tokens || {})[c.id];
        return pos && pos.x === x && pos.y === y;
      });
      if (tapped && tapped.type !== 'ally' && tapped.hp > 0) {
        openMapAttack(tapped);
        return;
      }
    }

    if (!moveSelecting) {
      // First tap must land on your own token
      if (x === myPos.x && y === myPos.y) {
        if (speed === 0) {
          showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">You can\'t move — ' + esc((me.conditions || []).join(', ') || 'speed 0') + '.</div>' +
            '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
          return;
        }
        moveSelecting = true;
        drawPlayerMap(d);
      }
      return;
    }
    // Second tap: destination
    moveSelecting = false;
    if (x === myPos.x && y === myPos.y) { drawPlayerMap(d); return; }
    const taken = (d.combatants || []).some(o => {
      if (o.id === me.id || o.hp <= 0 || (o.hidden && o.type !== 'ally')) return false;
      const op = (m.tokens || {})[o.id];
      return op && op.x === x && op.y === y;
    });
    if (taken) {
      drawPlayerMap(d);
      showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">That square is occupied.</div>' +
        '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
      return;
    }
    const ft = distFt(myPos, { x, y });
    if (ft > speed) {
      drawPlayerMap(d);
      showOverlay('<div style="text-align:center;font-size:15px;color:#e05050;">That\'s ' + ft + ' ft — your speed is ' + speed + ' ft' + (speed < ((pc && pc.speed) || 30) ? ' (' + esc((me.conditions || []).join(', ')) + ')' : '') + '.</div>' +
        '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:12px;" onclick="_pvCloseOverlay()">OK</button>');
      return;
    }
    sendPlayerRequest({ type: 'move', combatantId: me.id, x, y, baseSpeed: baseSpd, ts: Date.now() });
    showWaiting('🥾 Moving ' + ft + ' ft...');
    drawPlayerMap(d);
  });
}

// ══════════════════════════════════════════════════════════════
// RENDER: Root dispatcher
// ══════════════════════════════════════════════════════════════
function renderRoot(d) {
  latestData = d;
  // Don't clobber a journal draft mid-typing — data updates still land in latestData
  const ta = document.getElementById('pv-journal');
  if (activeTab === 'journal' && ta && document.activeElement === ta) return;
  const root = document.getElementById('pv-root');
  const party = d.party || [];

  if (!party.length) {
    root.innerHTML = '<div style="text-align:center;color:#555;padding:60px 0;font-style:italic;">No party members yet. Ask your DM to add characters.</div>';
    return;
  }

  // Check if selected PC still exists
  if (selectedPcId) {
    const found = party.find(pc => String(pc.id) === selectedPcId);
    if (!found) {
      selectedPcId = null;
      sessionStorage.removeItem('pv_selected_pc');
    }
  }

  // Table mode: always show whoever's turn it is (or the first character)
  if (tableMode && party.length) {
    let pick = null;
    if (d.combatActive && (d.combatants || [])[d.currentTurn]) {
      const cur = d.combatants[d.currentTurn];
      pick = party.find(p => p.name === cur.name || p.name === cur.owner);
    }
    if (!pick && selectedPcId) pick = party.find(p => String(p.id) === selectedPcId);
    if (!pick) pick = party[0];
    selectedPcId = String(pick.id);
  }

  // If we just created a character, auto-select it as soon as the DM's app adds it
  const pendingAdd = sessionStorage.getItem('pv_pending_add');
  if (!selectedPcId && pendingAdd) {
    const mine = party.find(p => p.name.toLowerCase() === pendingAdd);
    if (mine) {
      sessionStorage.removeItem('pv_pending_add');
      closeOverlay();
      selectedPcId = String(mine.id);
      sessionStorage.setItem('pv_selected_pc', selectedPcId);
    }
  }

  if (!selectedPcId) {
    root.innerHTML = renderSelectionScreen(party);
  } else {
    root.innerHTML = renderTwoColumnView(d);
    if (activeTab === 'map') { drawPlayerMap(d); bindMapInteraction(); }
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER: Table-mode death-save drama — the whole table watches
// ══════════════════════════════════════════════════════════════
function renderTableDeathDrama(d) {
  const party = d.party || [];
  const dying = (d.combatants || []).filter(c =>
    c.type === 'ally' && c.hp <= 0 && !c.isDead && !(c.conditions || []).includes('Stable'));
  if (!dying.length) return '';

  const pips = (n, on, off) => {
    let out = '';
    for (let i = 0; i < 3; i++) {
      const lit = i < n;
      out += '<span class="ds-pip ' + (lit ? 'filled' : '') + '" style="color:' + (lit ? on : off) + ';">' + (lit ? '●' : '○') + '</span>';
    }
    return out;
  };

  const cards = dying.map(cmb => {
    const pc = party.find(p => p.name === cmb.name) || {};
    const ds = cmb.deathSuccess || 0, df = cmb.deathFail || 0;
    const portrait = pc.portrait
      ? '<img src="' + pc.portrait + '" class="death-drama-portrait">'
      : '<div class="death-drama-portrait" style="display:inline-flex;align-items:center;justify-content:center;font-size:34px;font-family:Cinzel,serif;background:' + avatarColor(cmb.name) + ';color:#fff;">' + initials(cmb.name) + '</div>';
    let status = '';
    if (df >= 3) status = '<div style="color:#ff5050;font-family:Cinzel,serif;font-size:14px;letter-spacing:0.1em;margin-top:8px;">☠ FALLEN</div>';
    else if (ds >= 3) status = '<div style="color:#8fd050;font-family:Cinzel,serif;font-size:14px;letter-spacing:0.1em;margin-top:8px;">✔ STABILIZED</div>';
    else if (df === 2) status = '<div style="color:#ff8080;font-size:12px;margin-top:8px;">One breath from the end…</div>';
    else status = '<div style="color:var(--text-dim);font-size:12px;margin-top:8px;">' + (3 - ds) + ' to stabilize · ' + (3 - df) + ' to fall</div>';
    return '<div style="display:inline-block;margin:0 16px;vertical-align:top;">' +
      portrait +
      '<div style="font-family:Cinzel,serif;font-size:17px;color:#ff9090;margin-top:10px;">' + esc(cmb.name) + '</div>' +
      '<div style="margin-top:8px;display:flex;gap:22px;justify-content:center;">' +
        '<div><div style="font-size:9px;letter-spacing:0.12em;color:#8fd050;margin-bottom:2px;">SAVES</div>' + pips(ds, '#8fd050', '#38562a') + '</div>' +
        '<div><div style="font-size:9px;letter-spacing:0.12em;color:#e05050;margin-bottom:2px;">FAILS</div>' + pips(df, '#e05050', '#5a2a2a') + '</div>' +
      '</div>' + status +
    '</div>';
  }).join('');

  return '<div class="death-drama">' +
    '<div style="font-family:Cinzel,serif;font-size:16px;letter-spacing:0.18em;color:#ff6060;margin-bottom:14px;">💀 DEATH SAVE</div>' +
    cards +
  '</div>';
}

// ══════════════════════════════════════════════════════════════
// RENDER: Two-Column Layout (main + sidebar)
// ══════════════════════════════════════════════════════════════
function renderTwoColumnView(d) {
  const party = d.party || [];
  const combatants = d.combatants || [];
  const hasCombat = combatants.length > 0;

  let html = '<div class="pv-layout">';

  // ── LEFT: Main panel ──
  html += '<div class="pv-main">';

  // Toolbar (hidden in table mode — the table just plays)
  if (!tableMode) {
    html += '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
      '<button class="btn-pv" onclick="_pvChangeChar()">\u2190 Change Character</button>' +
      '<button class="btn-pv" id="copy-link-btn" onclick="_pvCopyLink()">📋 Copy Link</button>' +
    '</div>';
  } else {
    html += '<div style="text-align:center;font-family:Cinzel,serif;font-size:11px;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:10px;">📺 TABLE MODE — following the current turn</div>';
    html += renderTableDeathDrama(d); // dying allies: big portraits + pips for the whole table
  }

  // Messages
  const msgs = d.pvMessages || {};
  const partyMsg = d.pvPartyMessage || '';
  const pc = party.find(p => String(p.id) === selectedPcId);
  if (pc) {
    const personalMsg = msgs[pc.id] || msgs[String(pc.id)] || '';
    if (partyMsg) html += '<div class="msg-banner party-msg">📢 <strong>DM to Party:</strong> ' + esc(partyMsg) + '</div>';
    if (personalMsg) html += '<div class="msg-banner personal-msg">📨 <strong>DM to You:</strong> ' + esc(personalMsg) + '</div>';
  }

  // On deck: heads-up one turn early
  if (!isMyTurn(d) && d.combatActive && selectedPcId) {
    const meOn = myCombatant(d);
    if (meOn) {
      let n = d.currentTurn;
      const list = d.combatants || [];
      for (let step = 0; step < list.length; step++) {
        n = (n + 1) % list.length;
        const cand = list[n];
        if (!cand || cand.hidden || (cand.hp <= 0 && !(cand.type === 'ally' && !cand.isDead && !(cand.conditions || []).includes('Stable')))) continue;
        if (cand.id === meOn.id) {
          html += '<div style="text-align:center;font-family:Cinzel,serif;font-size:12px;letter-spacing:0.1em;color:#ffb450;border:1px dashed rgba(255,180,80,0.4);border-radius:6px;padding:6px;margin-bottom:10px;">🔜 YOU\'RE UP NEXT — plan your move!</div>';
        }
        break;
      }
    }
  }

  // YOUR TURN banner + economy meters + End Turn
  if (isMyTurn(d)) {
    const extraUnits = myUnits(d).filter(u => u.owner);
    var summonNote = extraUnits.length ? '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">You also command: ' + extraUnits.map(u => esc(u.name)).join(', ') + ' — tap their token on the map</div>' : '';
    const me = myCombatant(d);
    const tu = (me && me.turnUsed) || { actions: 0, bonus: false, movedFt: 0 };
    const spd = pvSpeedFt(me, (pc && pc.speed) || 30);
    const aMax = pvMaxActions(me);
    const aUsed = pvActionsUsed(me);
    const chip = (label, spent) =>
      '<span style="padding:3px 10px;border-radius:4px;font-size:11px;font-family:Cinzel,serif;border:1px solid ' +
      (spent ? 'rgba(255,255,255,0.15);color:#666;background:rgba(0,0,0,0.3);text-decoration:line-through' : 'rgba(143,208,80,0.5);color:#8fd050;background:rgba(143,208,80,0.08)') +
      ';">' + label + '</span>';
    html += '<div class="your-turn-banner">⚔ YOUR TURN' +
      '<div style="display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap;">' +
        chip('ACTION' + (aMax > 1 ? ' ' + Math.max(0, aMax - aUsed) + '/' + aMax : ''), aUsed >= aMax) + chip('BONUS', tu.bonus) +
        chip('MOVE ' + Math.max(0, spd - (tu.movedFt || 0)) + ' ft', (tu.movedFt || 0) >= spd) +
        '<button class="btn-pv" style="font-size:11px;padding:3px 12px;border-color:var(--gold);" onclick="_pvEndTurn()">⏭ End Turn</button>' +
      '</div>' + summonNote +
    '</div>';
  }

  // Tab toggle \u2014 Initiative shows when combat exists, Map shows when the DM has a map
  const hasMap = !!(d.mapState && d.mapState.cols);
  const hasWorld = !!(d.worldMap && d.worldMap.image);
  if (true) { // tabs always show — Journal is always available
    html += '<div class="pv-tabs">' +
      '<button class="pv-tab' + (activeTab === 'character' ? ' active' : '') + '" onclick="_pvSwitchTab(\'character\')">My Character</button>' +
      (tableMode ? '' : '<button class="pv-tab' + (activeTab === 'inventory' ? ' active' : '') + '" onclick="_pvSwitchTab(\'inventory\')">\ud83c\udf92 Bag</button>') +
      ((!tableMode && pvHasShopping(d)) ? '<button class="pv-tab' + (activeTab === 'shop' ? ' active' : '') + '" onclick="_pvSwitchTab(\'shop\')">\ud83c\udfea Shop' + ((pvMyOffers(d).length + pvIncomingSwaps(d).length) ? ' <span style="background:#b02020;color:#fff;border-radius:8px;font-size:9px;padding:0 5px;">' + (pvMyOffers(d).length + pvIncomingSwaps(d).length) + '</span>' : '') + '</button>' : '') +
      (hasCombat ? '<button class="pv-tab' + (activeTab === 'initiative' ? ' active' : '') + '" onclick="_pvSwitchTab(\'initiative\')">\u2694 Initiative</button>' : '') +
      (hasMap ? '<button class="pv-tab' + (activeTab === 'map' ? ' active' : '') + '" onclick="_pvSwitchTab(\'map\')">\ud83d\uddfa Map</button>' : '') +
      (hasWorld ? '<button class="pv-tab' + (activeTab === 'world' ? ' active' : '') + '" onclick="_pvSwitchTab(\'world\')">🌍 World</button>' : '') +
      (tableMode ? '' : '<button class="pv-tab' + (activeTab === 'journal' ? ' active' : '') + '" onclick="_pvSwitchTab(\'journal\')">📖 Journal</button>') +
    '</div>';
  }

  // Tab content
  if (activeTab === 'shop') {
    html += renderShopTab(d);
  } else if (activeTab === 'inventory') {
    html += renderInventoryTab(d);
  } else if (activeTab === 'initiative' && hasCombat) {
    html += renderInitiativePanel(d);
  } else if (activeTab === 'map' && hasMap) {
    html += renderMapPanel(d);
  } else if (activeTab === 'world' && hasWorld) {
    html += '<div class="card"><div class="card-section-label">🌍 The World</div>' +
      '<img src="' + d.worldMap.image + '" style="width:100%;height:auto;display:block;border-radius:8px;border:1px solid rgba(212,175,55,0.25);"></div>';
  } else if (activeTab === 'journal') {
    html += renderJournalPanel(d);
  } else {
    html += renderCharacterCard(d);
  }

  // Recent events — what just happened, at your own pace
  if ((d.recentLog || []).length) {
    html += '<details style="margin-top:12px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;">' +
      '<summary style="font-family:Cinzel,serif;font-size:11px;letter-spacing:0.12em;color:var(--text-dim);cursor:pointer;">📜 RECENT EVENTS</summary>' +
      '<div style="margin-top:8px;max-height:220px;overflow-y:auto;">' +
      d.recentLog.slice(0, 20).map(l =>
        '<div style="font-size:12.5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:' +
        (l.type === 'damage' ? '#ff9090' : l.type === 'heal' ? '#8fd050' : 'var(--text-dim)') + ';">' +
        '<span style="color:#555;font-size:10px;">R' + (l.round || '—') + '</span> ' + esc(l.text) + '</div>').join('') +
      '</div></details>';
  }

  html += '</div>'; // close pv-main

  // ── RIGHT: Party sidebar ──
  html += '<div class="pv-sidebar">';
  html += renderPartySidebar(d);
  html += '</div>';

  html += '</div>'; // close pv-layout
  return html;
}

// ══════════════════════════════════════════════════════════════
// RENDER: Shop tab — browse merchants, build a cart, offer to trade
// ══════════════════════════════════════════════════════════════
let pvShopId = null;                 // which shop is open
let pvCart = { items: [], gold: 0, tradeIns: [] }; // items:[{id,qty}], tradeIns:[invId]

function pvOpenShops(d) { return (d.shops || []); }
function pvMyOffers(d) { return (d.trades || []).filter(t => t.pcId && String(t.pcId) === selectedPcId && t.status === 'awaiting-player'); }
// P2P swaps proposed TO me (I'm the recipient) — I get to accept/decline
function pvIncomingSwaps(d) { return (d.trades || []).filter(t => t.kind === 'p2p' && String(t.bPcId) === selectedPcId && t.status === 'pending'); }
function pvHasShopping(d) { return pvOpenShops(d).length > 0 || pvMyOffers(d).length > 0 || pvIncomingSwaps(d).length > 0 ||
  (d.trades || []).some(t => t.kind === 'p2p' && String(t.aPcId) === selectedPcId && t.status === 'pending'); }

function renderShopTab(d) {
  const pc = (d.party || []).find(p => String(p.id) === selectedPcId);
  if (!pc) return '<div class="card">Select a character first.</div>';
  let html = '';

  // DM-pushed offers waiting on you
  pvMyOffers(d).forEach(t => {
    const goods = (t.get || []).map(g => esc(g.name) + (g.qty > 1 ? ' ×' + g.qty : '')).join(', ');
    html += '<div class="card" style="border:1px solid rgba(200,168,255,0.5);background:rgba(120,90,200,0.08);">' +
      '<div style="font-family:Cinzel,serif;font-size:16px;color:#c8a8ff;margin-bottom:4px;">🤝 The DM offers you a deal</div>' +
      '<div style="font-size:14px;color:var(--gold-light);margin-bottom:2px;">Get: ' + goods + '</div>' +

  pvIncomingSwaps(d).forEach(t => {
    const aGives = (t.aItems || []).map(x => esc(x.name)).concat(t.aGold ? ['🪙 ' + t.aGold] : []);

      '<div style="display:flex;gap:8px;">' +
        '<button class="btn-pv" style="flex:1;justify-content:center;border-color:var(--gold);color:var(--gold-light);" onclick="_pvAcceptOffer(' + t.id + ')">✓ Accept swap</button>' +
        '<button class="btn-pv" style="flex:1;justify-content:center;" onclick="_pvDeclineOffer(' + t.id + ')">Decline</button>' +
      '</div></div>';
  });
  // Swaps I proposed, waiting on the other player
  (d.trades || []).filter(t => t.kind === 'p2p' && String(t.aPcId) === selectedPcId && t.status === 'pending').forEach(t => {
    html += '<div class="card" style="border-color:rgba(212,175,55,0.3);"><div style="font-size:13px;color:var(--gold-light);">⏳ Swap proposed to ' + esc(t.bName) + ' — waiting for them to accept.</div></div>';
  });

  // Your pending/resolved offers
  const mine = (d.trades || []).filter(t => t.pcId && String(t.pcId) === selectedPcId && (t.status === 'pending' || (t.status === 'accepted' || t.status === 'declined')));
  if (mine.some(t => t.status === 'pending')) {
    html += '<div class="card" style="border-color:rgba(212,175,55,0.3);"><div style="font-size:13px;color:var(--gold-light);">⏳ Waiting on the DM to approve your offer…</div></div>';
  }

  // Player-to-player trade launcher (needs at least one other party member)
  if ((d.party || []).length > 1) {
    html += '<div style="text-align:center;margin-bottom:10px;"><button class="btn-pv" style="border-color:#c8a8ff;color:#c8a8ff;" onclick="_pvOpenP2P()">🤝 Trade with a party member</button></div>';
  }

  const shops = pvOpenShops(d);
  if (!shops.length && !pvMyOffers(d).length && (d.party || []).length <= 1) {
    return html + '<div class="card"><div style="color:#555;font-style:italic;text-align:center;padding:20px 0;">No shops are open right now.</div></div>';
  }
  if (!shops.length) return html;

  // Shop picker
  if (!pvShopId || !shops.find(s => s.id === pvShopId)) pvShopId = shops.length ? shops[0].id : null;
  if (shops.length > 1) {
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">' +
      shops.map(s => '<button class="btn-pv" style="font-size:12px;' + (s.id === pvShopId ? 'border-color:var(--gold);color:var(--gold-light);' : '') + '" onclick="_pvOpenShop(' + s.id + ')">🏪 ' + esc(s.name) + '</button>').join('') + '</div>';
  }
  const shop = shops.find(s => s.id === pvShopId);
  if (!shop) return html;

  html += '<div class="card">';
  html += '<div style="font-family:Cinzel,serif;font-size:18px;color:var(--gold);margin-bottom:2px;">🏪 ' + esc(shop.name) + '</div>' +
    (shop.npcName ? '<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">tended by ' + esc(shop.npcName) + '</div>' : '') +
    '<div style="font-size:12px;color:#ffd700;margin-bottom:12px;">Your gold: 🪙 ' + (pc.gold || 0) + '</div>';

  // Stock
  (shop.items || []).forEach(it => {
    const inCart = pvCart.items.find(c => c.id === it.id);
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid rgba(255,255,255,0.07);border-radius:5px;margin-bottom:4px;background:rgba(0,0,0,0.15);">' +
      '<div style="flex:1;min-width:0;"><span style="font-size:13px;color:var(--parchment);">' + esc(it.name) + '</span>' +
        '<span style="font-size:10px;color:#555;"> · ' + esc(it.slot) + (it.qty > 1 ? ' · ' + it.qty + ' in stock' : '') + '</span></div>' +
      '<span style="color:#ffd700;font-size:13px;">🪙 ' + it.price + '</span>' +
      (inCart ? '<span style="color:#8fd050;font-size:12px;">✓ ×' + inCart.qty + '</span><button class="btn-pv" style="font-size:11px;padding:2px 8px;" onclick="_pvCartRemove(' + it.id + ')">−</button>'
              : '<button class="btn-pv" style="font-size:11px;padding:2px 10px;border-color:var(--gold);" onclick="_pvCartAdd(' + it.id + ')">Add</button>') +
    '</div>';
  });
  if (!(shop.items || []).length) html += '<div style="font-size:12px;color:#555;font-style:italic;">Nothing in stock.</div>';

  // Cart + payment
  const cartItems = pvCart.items.map(c => ({ ...c, item: shop.items.find(i => i.id === c.id) })).filter(c => c.item);
  const cartTotal = cartItems.reduce((n, c) => n + c.item.price * c.qty, 0);
  const tradeCredit = pvCart.tradeIns.reduce((n, iid) => {
    const it = (pc.inventory || []).find(i => i.id === iid);
    return n + (it ? Math.round(pvItemVal(it) * (shop.buyback || 0.5)) : 0);
  }, 0);
  if (cartItems.length) {
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);">' +
      '<div class="card-section-label" style="border:none;padding:0;margin-bottom:6px;">🛒 Your Offer</div>' +
      '<div style="font-size:13px;color:var(--text-dim);">Buying: ' + cartItems.map(c => esc(c.item.name) + (c.qty > 1 ? ' ×' + c.qty : '')).join(', ') + '</div>' +
      '<div style="font-size:13px;color:#ffd700;margin:4px 0;">Total: 🪙 ' + cartTotal + '</div>';
    // Trade-in items
    const sellable = (pc.inventory || []).filter(i => !i.equipped);
    if (sellable.length) {
      html += '<div style="font-size:11px;color:var(--text-dim);margin:8px 0 4px;">Offer items as part of the payment (credited at ' + Math.round((shop.buyback || 0.5) * 100) + '%):</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:5px;">' +
        sellable.map(i => '<button class="btn-pv" style="font-size:11px;padding:2px 8px;' + (pvCart.tradeIns.includes(i.id) ? 'border-color:#8fd050;color:#8fd050;' : '') + '" onclick="_pvToggleTradeIn(' + i.id + ')">' + esc(i.name) + ' <span style="color:#ffd700;">+' + Math.round(pvItemVal(i) * (shop.buyback || 0.5)) + '</span></button>').join('') +
        '</div>';
    }
    const owed = Math.max(0, cartTotal - tradeCredit);
    html += '<div style="font-size:13px;margin-top:10px;">Trade-in credit: <span style="color:#8fd050;">🪙 ' + tradeCredit + '</span> · Gold still owed: <strong style="color:#ffd700;">🪙 ' + owed + '</strong></div>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:10px;border-color:' + ((pc.gold || 0) >= owed ? 'var(--gold)' : '#e05050') + ';color:' + ((pc.gold || 0) >= owed ? 'var(--gold-light)' : '#ff8080') + ';" onclick="_pvSubmitOffer(' + owed + ')">' +
        ((pc.gold || 0) >= owed ? '🤝 Send Offer to DM' : 'Not enough gold (need ' + owed + ')') + '</button>' +
      '<button class="btn-pv" style="width:100%;justify-content:center;margin-top:6px;" onclick="_pvCartClear()">Clear cart</button>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

// Local value estimate for trade-in credit (mirrors itemValue in trade.js)
const PV_PRICE_DB = { 'dagger':2,'shortsword':10,'longsword':15,'greatsword':50,'rapier':25,'scimitar':25,'battleaxe':10,'greataxe':30,'warhammer':15,'maul':10,'mace':5,'handaxe':5,'spear':1,'quarterstaff':1,'club':1,'javelin':1,'glaive':20,'halberd':20,'morningstar':15,'flail':10,'whip':2,'trident':5,'light crossbow':25,'heavy crossbow':50,'hand crossbow':75,'longbow':50,'shortbow':25,'sling':1,'net':1,'padded armor':5,'leather armor':10,'studded leather':45,'hide armor':10,'chain shirt':50,'scale mail':50,'breastplate':400,'half plate':750,'ring mail':30,'chain mail':75,'splint armor':200,'plate armor':1500,'shield':10,'potion of healing':50,'potion of greater healing':150,'potion of superior healing':450,'torch':1,'lantern':5,'rope':1,'rations':1,'holy water':25,'antitoxin':50,'arrows':1,'crossbow bolts':1 };
const PV_RARITY_VALUE = { common:75, uncommon:400, rare:4000, 'very rare':40000, legendary:100000 };
function pvItemVal(item) {
  if (!item) return 0;
  if (typeof item.price === 'number' && item.price > 0) return item.price;
  const name = String(item.name || '').toLowerCase().trim();
  if (PV_PRICE_DB[name] !== undefined) return PV_PRICE_DB[name];
  let rarity = null;
  if (/legendary|artifact|vorpal|holy avenger/i.test(name)) rarity = 'legendary';
  else if (/\+3\b|very rare/i.test(name)) rarity = 'very rare';
  else if (/\+2\b|\brare\b|flame ?tongue|frost brand|dragon slayer/i.test(name)) rarity = 'rare';
  else if (/\+1\b|\bof \b|uncommon|bag of holding|cloak of|boots of|gauntlets of|amulet of|ring of/i.test(name)) rarity = 'uncommon';
  if (rarity) { let v = PV_RARITY_VALUE[rarity]; if (item.slot === 'potion' || /potion|scroll|oil|dust|elixir/i.test(name)) v = Math.round(v / 2); return v; }
  for (const k in PV_PRICE_DB) { if (name.indexOf(k) >= 0) return PV_PRICE_DB[k]; }
  return { weapon:10, armor:50, shield:10, wearable:25, potion:50, light:2, ammo:1, gear:5 }[item.slot] || 5;
}
